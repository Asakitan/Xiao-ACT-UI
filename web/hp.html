<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HP</title>
<style>
/* ═══ Reset ═══ */
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ═══ SAO Fonts ═══ */
@font-face {
    font-family: 'sao';
    src: url('fonts/SAOUI.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
}
@font-face {
    font-family: 'saoLatin';
    src: url('fonts/SAOUI.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
    unicode-range: U+0000-00FF, U+0100-024F, U+1E00-1EFF, U+2000-206F, U+20A0-20CF;
}
@font-face {
    font-family: 'yuanJWD';
    src: url('fonts/ZhuZiAYuanJWD.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
}
@font-face {
    font-family: 'yuanJWDCJK';
    src: url('fonts/ZhuZiAYuanJWD.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
    unicode-range: U+2E80-2EFF, U+3000-303F, U+31C0-31EF, U+3400-4DBF, U+4E00-9FFF, U+F900-FAFF;
}

:root {
    --font-sao: 'saoLatin', 'sao', 'Segoe UI', sans-serif;
    --font-ui: 'saoLatin', 'sao', 'yuanJWDCJK', 'yuanJWD', 'Segoe UI', sans-serif;
}

/* ═══ Body — native pywebview transparency ═══
   transparent=True 已由 pywebview 设置 WebView2 透明背景.
   html/body 保持 transparent, 不要用 rgb(1,0,1) 色键颜色——
   WebView2 会把色键颜色渲染成灰色而非穿透. */
html, body {
    background: transparent;
    user-select: none;
    -webkit-user-select: none;
    margin: 0;
    padding: 0;
    overflow: visible;
    scrollbar-width: none;
    -ms-overflow-style: none;
}
html::-webkit-scrollbar, body::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
}

body {
    padding: 0 10px 0 10px;
    height: 100vh;
    position: relative;
}

/* ═══════════════════════════════════════
   HP Component — exact copy from SAO-UI
   packages/HP/src/index.vue
   ═══════════════════════════════════════ */
/* ═══ Entry Animation ═══ */
@keyframes hp-slide-in {
    0%   { opacity: 0; transform: scale(0.72); filter: blur(16px) drop-shadow(0 0 0 rgba(50, 50, 0, 0)); }
    60%  { opacity: 1; transform: scale(1.03); filter: blur(1.2px) drop-shadow(3px 6px 12px rgba(50, 50, 0, 0.32)); }
    100% { opacity: 1; transform: scale(1); filter: blur(0px) drop-shadow(2px 4px 3px rgba(50, 50, 0, 0.5)); }
}

@keyframes hp-live-blur {
    0%   { filter: blur(0px) drop-shadow(2px 4px 3px rgba(50, 50, 0, 0.5)); }
    25%  { filter: blur(0.2px) drop-shadow(1px 6px 8px rgba(50, 50, 0, 0.38)); }
    50%  { filter: blur(0.08px) drop-shadow(2px 4px 4px rgba(50, 50, 0, 0.46)); }
    75%  { filter: blur(0.22px) drop-shadow(3px 5px 8px rgba(50, 50, 0, 0.36)); }
    100% { filter: blur(0px) drop-shadow(2px 4px 3px rgba(50, 50, 0, 0.5)); }
}

@keyframes hp-exit-blur {
    0%   { opacity: 1; transform: scale(1); filter: blur(0px) drop-shadow(2px 4px 3px rgba(50, 50, 0, 0.5)); }
    55%  { opacity: 0.88; transform: scale(1.04) translate(10px, -4px); filter: blur(3px) drop-shadow(4px 8px 14px rgba(50, 50, 0, 0.34)); }
    100% { opacity: 0; transform: scale(0.82) translate(28px, -10px); filter: blur(18px) drop-shadow(0 0 0 rgba(50, 50, 0, 0)); }
}
/* ═══ Idle Float REMOVED — fixed position ═══ */

.XTBox {
    --bgColor: rgba(207, 208, 197, 1.0);
    --fontcolor: rgba(60, 62, 50, 1);
    --hover: rgba(220, 222, 212, 1.0);
    position: absolute;
    bottom: 22px;
    left: 46%;
    width: 505px;
    height: 48px;
    display: flex;
    filter: blur(0px) drop-shadow(2px 4px 3px rgba(50, 50, 0, 0.28));
    font-family: var(--font-ui);
    letter-spacing: 1px;
    color: rgba(60, 62, 50, 1);
    font-size: 14px;
    cursor: pointer;
    z-index: 2;
    animation: hp-slide-in 0.6s cubic-bezier(0.22, 1, 0.36, 1) both,
               hp-live-blur 8.5s ease-in-out 0.7s infinite;
}

.XTBox.hp-reenter {
    animation: hp-slide-in 0.6s cubic-bezier(0.22, 1, 0.36, 1) both,
               hp-live-blur 8.5s ease-in-out 0.7s infinite;
}

.XTBox.hp-exit {
    animation: hp-exit-blur 0.28s cubic-bezier(0.4, 0, 0.2, 1) both;
}

.xt_left, .xt_right, .number_xt { height: 100%; }

.xt_left {
    width: 26px;
    clip-path: polygon(0% 25%, 50% 25%, 50% 75%, 0% 75%, 0% 100%, 100% 100%, 100% 0%, 0% 0%);
    margin-right: 3px;
    background: var(--bgColor);
    transition: background 0.15s ease;
}

.xt_right {
    flex: 1;
    clip-path: polygon(85px 22%, 100% 22%, 100% 0%, 0% 0%, 0 100%, 228px 100%, 234px 77%, 100% 77%, 100% 60%, 233px 60%, 228px 77%, 85px 77%);
    background: linear-gradient(to right, var(--bgColor) 50%, rgba(207, 208, 197, 0));
    display: flex;
    align-items: center;
    user-select: none;
    transition: background 0.15s ease;
}

.xt_right > span {
    min-width: 80px;
    max-width: 85px;
    text-align: center;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
    padding-left: 10px;
}

.number_xt {
    position: absolute;
    top: 82%;
    left: 58%;
    width: 220px;
    height: 20px;
    display: flex;
    overflow: hidden;
    clip-path: polygon(14px 0, 100% 0, 100% 100%, 0 100%, 0 58%);
}

.number_xt > div {
    background: var(--bgColor);
    box-shadow: -4px 3px 27px 3px rgba(0, 0, 0, 0.1);
    padding-right: 5px;
    text-align: right;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
    user-select: none;
    transition: background 0.15s ease;
}

.number_xt div:nth-child(1) { width: 55%; margin-right: 3px; }
.number_xt div:nth-child(2) { width: 44%; font-size: 12px; padding-left: 4px; text-align: left; }

/* ═══ Hover ═══ */
.XTBox:hover .xt_left,
.XTBox:hover .number_xt div {
    background: var(--hover);
}
.XTBox:hover .xt_right {
    background: linear-gradient(to right, var(--hover) 50%, rgba(220, 222, 212, 0));
}
.XTBox:hover .xt_border { opacity: .8; }

/* ═══ SVG border ═══ */
.svg_border {
    position: absolute;
    left: 114px;
    top: 10px;
}

/* ═══ HP bar border + fill ═══ */
.xt_border {
    position: absolute;
    left: 114px;
    top: 10px;
    width: 350px;
    height: 27px;
    clip-path: polygon(0 0, 100% 0, calc(100% - 5px) 19px, 145px 19px, 141px 100%, 0 100%);
    overflow: hidden;
    opacity: 1.0;
    transition: opacity 0.15s ease;
}

.xt_border_left {
    position: absolute;
    left: 0;
    top: 0;
    width: 1.5px;
    height: 100%;
    background: rgb(218, 215, 215);
    z-index: 3;
}

.xt_border_right {
    position: absolute;
    inset: 0;
    z-index: 1;
}

.tb_line {
    width: 100%;
    height: 1px;
    background: rgb(218, 215, 215);
}

.xt_in {
    height: 25px;
    width: 100%;
    position: relative;
    transition: width 0.3s ease, background 0.3s ease;
}
.xt_in::after {
    content: '';
    position: absolute;
    top: 0;
    right: -11px;
    width: 18px;
    height: 100%;
    background: inherit;
    transform: skewX(-14deg);
    pointer-events: none;
}
.xt_in.is-empty::after {
    display: none;
}
.xt_in.is-full {
    width: calc(100% + 6px) !important;
}

.xt_in_green {
    background: linear-gradient(to right, rgb(211, 234, 124), rgb(154, 211, 52));
}
.xt_in_yellow {
    background: linear-gradient(to right, rgb(235, 238, 112), rgb(244, 250, 73));
}
.xt_in_red {
    background: linear-gradient(to right, rgb(248, 140, 122), rgb(239, 104, 78));
}

/* ═══ Opaque background cover — hides native HP & STA bars ═══ */
.hp-bg-cover {
    position: absolute;
    bottom: 0;
    left: 44%;
    width: 545px;
    height: 80px;
    background: linear-gradient(
        175deg,
        rgba(188, 190, 178, 1.0) 0%,
        rgba(178, 180, 168, 1.0) 45%,
        rgba(172, 174, 162, 1.0) 100%
    );
    z-index: 0;
    pointer-events: none;
    border-radius: 6px 6px 2px 2px;
    box-shadow:
        2px 3px 18px rgba(0, 0, 0, 0.22),
        inset 0 0 22px rgba(255, 255, 255, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
    border: 1px solid rgba(160, 162, 150, 0.50);
    overflow: hidden;
}
.hp-bg-corner {
    position: absolute;
    right: 2px;
    bottom: 2px;
    width: 16px;
    height: 16px;
    border-bottom: 1.5px solid rgba(212, 156, 23, 0.50);
    border-right: 1.5px solid rgba(212, 156, 23, 0.50);
    pointer-events: none;
    border-radius: 0 0 3px 0;
}
/* SAO scan-line overlay */
.hp-bg-cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 2px,
        rgba(255, 255, 255, 0.04) 2px,
        rgba(255, 255, 255, 0.04) 3px
    );
    pointer-events: none;
}
/* SAO corner markers */
.hp-bg-cover::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    border-top: 1.5px solid rgba(104, 228, 255, 0.55);
    border-left: 1.5px solid rgba(104, 228, 255, 0.55);
    pointer-events: none;
    border-radius: 3px 0 0 0;
}
/* Gold corner (bottom-right) via box-shadow trick */

/* HUD lane float keyframes removed — fixed positions */

.hp-hud {
    position: absolute;
    inset: -18px -10px -12px -10px;
    pointer-events: none;
    overflow: visible;
}
.hp-hud-lane {
    position: absolute;
    width: 112px;
    height: 18px;
    border: 1px solid rgba(104, 228, 255, 0.34);
    clip-path: polygon(0 14%, 88% 14%, 100% 0, 100% 100%, 10% 100%, 0 78%);
    box-shadow: inset 0 0 12px rgba(104, 228, 255, 0.08);
}
.hp-hud-lane::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0) 0 10px, rgba(255,255,255,.10) 10px 11px, rgba(255,255,255,0) 11px 18px);
    opacity: .28;
}
.hp-hud-lane.gold {
    border-color: rgba(243, 175, 18, 0.34);
    box-shadow: inset 0 0 12px rgba(243, 175, 18, 0.08);
}
.hp-hud-label {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    font-family: var(--font-ui);
    font-size: 10px;
    letter-spacing: 1px;
    color: rgba(104, 228, 255, 0.78);
}
.hp-hud-lane.gold .hp-hud-label { color: rgba(243, 175, 18, 0.82); }
.hp-left-far { left: -6px; top: 4px; }
.hp-left-near { left: 10px; bottom: -8px; }
.hp-right-far { right: -8px; top: 22px; }
.hp-right-near { right: 4px; bottom: 2px; }

/* ═══ Playing status indicator ═══ */
@keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1.0; }
}
.XTBox.playing .xt_left {
    background: rgba(154, 211, 52, 0.6);
    animation: pulse 1.5s ease-in-out infinite;
}
.XTBox.paused .xt_left {
    background: rgba(244, 250, 73, 0.6);
}

/* ═══ Context Menu — SAO frosted-glass frame, opens upward ═══ */
.context-menu {
    display: none;
    position: fixed;
    background: rgba(207, 208, 197, 0.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(104, 228, 255, 0.25);
    border-radius: 2px;
    box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.18),
                inset 0 0 18px rgba(255, 255, 255, 0.12);
    font-family: var(--font-ui);
    font-size: 12px;
    color: rgba(60, 62, 50, 0.95);
    z-index: 1000;
    min-width: 148px;
    padding: 6px 0;
    -webkit-app-region: no-drag;
}
/* SAO decorative corner lines */
.context-menu::before,
.context-menu::after {
    content: '';
    position: absolute;
    pointer-events: none;
}
.context-menu::before {
    top: -1px; left: -1px;
    width: 18px; height: 18px;
    border-top: 2px solid rgba(104, 228, 255, 0.7);
    border-left: 2px solid rgba(104, 228, 255, 0.7);
}
.context-menu::after {
    bottom: -1px; right: -1px;
    width: 18px; height: 18px;
    border-bottom: 2px solid rgba(243, 175, 18, 0.6);
    border-right: 2px solid rgba(243, 175, 18, 0.6);
}
.context-menu.show { display: block; }
.context-menu .cm-item {
    padding: 4px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
}
.context-menu .cm-item:hover {
    background: rgba(212, 156, 23, 0.18);
    color: rgba(170, 120, 20, 1);
}
.context-menu .cm-sep {
    height: 1px;
    background: rgba(97, 98, 86, 0.15);
    margin: 2px 6px;
}
.context-menu .cm-icon {
    position: relative;
    display: inline-block;
    width: 24px;
    min-width: 24px;
    height: 18px;
    color: rgba(97, 98, 86, 0.85);
    opacity: 0.96;
    filter: drop-shadow(0 0 4px rgba(97, 98, 86, 0.12));
    background:
        linear-gradient(90deg, currentColor, currentColor) left top 3px / 7px 1px no-repeat,
        linear-gradient(90deg, currentColor, currentColor) right bottom 3px / 7px 1px no-repeat,
        linear-gradient(180deg, rgba(97, 98, 86, 0.12), rgba(97, 98, 86, 0)) center / 100% 100% no-repeat;
}
.context-menu .cm-icon::before,
.context-menu .cm-icon::after { content: ''; position: absolute; box-sizing: border-box; border-color: currentColor; }
.context-menu .cm-item:hover .cm-icon {
    color: rgba(170, 120, 20, 1);
    filter: drop-shadow(0 0 8px rgba(212, 156, 23, 0.22));
}
.cm-icon.mi-play::before { left: 7px; top: 2px; width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 8px solid currentColor; }
.cm-icon.mi-stop::before { left: 6px; top: 3px; width: 10px; height: 10px; border: 2px solid currentColor; }
.cm-icon.mi-file::before { left: 5px; top: 2px; width: 12px; height: 12px; border: 2px solid currentColor; }
.cm-icon.mi-file::after { right: 5px; top: 2px; width: 5px; height: 5px; border-top: 2px solid currentColor; border-right: 2px solid currentColor; }
.cm-icon.mi-dir::before { left: 3px; top: 5px; width: 16px; height: 8px; border: 2px solid currentColor; border-radius: 2px; }
.cm-icon.mi-dir::after { left: 5px; top: 2px; width: 7px; height: 5px; border: 2px solid currentColor; border-bottom: none; border-radius: 2px 2px 0 0; }
.cm-icon.mi-speedup::before { left: 10px; top: 2px; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-bottom: 7px solid currentColor; }
.cm-icon.mi-speedup::after { left: 4px; top: 12px; width: 14px; height: 2px; background: currentColor; }
.cm-icon.mi-speeddown::before { left: 10px; top: 7px; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 7px solid currentColor; }
.cm-icon.mi-speeddown::after { left: 4px; top: 2px; width: 14px; height: 2px; background: currentColor; }
.cm-icon.mi-ent::before { left: 5px; top: 3px; width: 12px; height: 10px; border: 2px solid currentColor; clip-path: polygon(25% 0, 75% 0, 100% 50%, 75% 100%, 25% 100%, 0 50%); }
.cm-icon.mi-old::before { left: 4px; top: 3px; width: 11px; height: 11px; border: 2px solid currentColor; border-left-color: transparent; border-radius: 50%; }
.cm-icon.mi-old::after { right: 3px; top: 2px; width: 0; height: 0; border-left: 5px solid currentColor; border-top: 3px solid transparent; border-bottom: 3px solid transparent; }
.cm-icon.mi-rank::before { left: 3px; bottom: 2px; width: 4px; height: 5px; border: 2px solid currentColor; box-shadow: 6px -3px 0 -2px currentColor, 12px -6px 0 -2px currentColor; }
.cm-icon.mi-exit::before, .cm-icon.mi-exit::after { left: 10px; top: 1px; width: 2px; height: 14px; background: currentColor; }
.cm-icon.mi-exit::before { transform: rotate(45deg); }
.cm-icon.mi-exit::after { transform: rotate(-45deg); }
.cm-icon.mi-menu::before { left: 4px; top: 3px; width: 14px; height: 2px; background: currentColor; box-shadow: 0 4px 0 currentColor, 0 8px 0 currentColor; }

/* ═══ Skill Bar — SAO frosted-glass skill slots ═══ */
.skill-bar {
    position: absolute;
    bottom: 86px;
    left: 44%;
    display: flex;
    gap: 4px;
    align-items: flex-end;
    pointer-events: none;
    font-family: var(--font-ui);
    z-index: 2;
    opacity: 0;
    transition: opacity 0.4s ease;
}
.skill-bar.visible { opacity: 1; }
.skill-slot {
    position: relative;
    width: 36px;
    height: 36px;
    background: rgba(207, 208, 197, 0.65);
    border: 1px solid rgba(180, 182, 170, 0.5);
    border-radius: 2px;
    overflow: hidden;
    box-shadow: inset 0 0 6px rgba(0,0,0,0.08);
}
.skill-slot .sk-cd {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 0%;
    background: rgba(60, 62, 50, 0.55);
    transition: height 0.3s ease;
}
.skill-slot .sk-idx {
    position: absolute;
    bottom: 1px;
    right: 2px;
    font-size: 8px;
    color: rgba(97, 98, 86, 0.6);
    letter-spacing: 0;
    line-height: 1;
}
.skill-slot.active {
    border-color: rgba(212, 156, 23, 0.7);
    box-shadow: 0 0 8px rgba(212, 156, 23, 0.35), inset 0 0 6px rgba(212, 156, 23, 0.15);
}
.skill-slot.ready {
    background: rgba(207, 208, 197, 0.75);
}
.skill-slot.cooling {
    background: rgba(190, 192, 180, 0.55);
}

/* ═══ Level Up Overlay ═══ */
@keyframes lv-bg-anim {
    0%   { background: rgba(0,0,0,0); }
    8%   { background: rgba(243,175,18,0.85); }
    22%  { background: rgba(255,255,255,0.80); }
    35%  { background: rgba(26,26,26,0.88); }
    78%  { background: rgba(26,26,26,0.35); }
    100% { background: rgba(26,26,26,0); }
}
@keyframes lv-text-anim {
    0%   { transform: scale(0.05); opacity: 0; }
    30%  { transform: scale(1.10); opacity: 1; }
    42%  { transform: scale(0.95); }
    55%  { transform: scale(1.00); opacity: 1; }
    80%  { transform: scale(1.00); opacity: 0.95; }
    100% { transform: scale(1.00); opacity: 0; }
}
#lv-overlay {
    display: none;
    position: fixed;
    left: -10px;
    bottom: 8px;
    width: 100%;
    height: 280px;
    z-index: 999;
    pointer-events: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    overflow: hidden;
}
#lv-overlay.show {
    display: flex;
    animation: lv-bg-anim 2.6s ease forwards;
}
#lv-overlay .lv-content {
    text-align: center;
    animation: lv-text-anim 2.6s ease forwards;
    animation-delay: 0.08s;
    opacity: 0;
}
.lv-title {
    font-family: var(--font-ui);
    font-size: 38px;
    font-weight: bold;
    color: #f3af12;
    text-shadow: 0 0 24px rgba(243,175,18,0.95), 0 2px 8px rgba(0,0,0,0.95);
    letter-spacing: 4px;
    line-height: 1;
}
.lv-num {
    font-family: var(--font-ui);
    font-size: 22px;
    color: #ffffff;
    margin-top: 10px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.95);
    letter-spacing: 2px;
}

/* ═══ Identity Plate — SAO sci-fi panel with depth ═══ */
@keyframes id-scanline {
    0%   { transform: translateY(-100%); }
    100% { transform: translateY(400%); }
}
@keyframes id-pulse {
    0%, 100% { opacity: 0.6; }
    50%      { opacity: 1.0; }
}
@keyframes id-data-stream {
    0%   { background-position: 0 0; }
    100% { background-position: 200px 0; }
}
.id-plate {
    position: absolute;
    bottom: 2px;
    left: 4%;
    width: 37%;
    height: 108px;
    background: linear-gradient(
        175deg,
        rgba(188, 190, 178, 1.0) 0%,
        rgba(178, 180, 168, 1.0) 45%,
        rgba(172, 174, 162, 1.0) 100%);
    clip-path: polygon(0 0, 86% 0, 100% 22%, 100% 100%, 0 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8px 28px 8px 22px;
    font-family: var(--font-ui);
    color: rgba(97, 98, 86, 1);
    letter-spacing: 1.5px;
    pointer-events: none;
    /* box-shadow 被 clip-path 裁剪, 用 filter:drop-shadow 代替 —
       drop-shadow 在 clip-path 裁剪后应用, 因此右侧斜角也有阴影/描边效果 */
    filter: drop-shadow(2px 3px 14px rgba(0, 0, 0, 0.32))
            drop-shadow(0 0 1px rgba(160, 162, 150, 0.70));
    box-shadow:
        inset 0 0 22px rgba(255, 255, 255, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
    border: 1px solid rgba(160, 162, 150, 0.50);
    z-index: 1;
    border-radius: 6px 0 2px 6px;
    overflow: hidden;
}
/* Scan-line overlay — matches hp-bg-cover texture */
.id-plate .id-scanline-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 5;
}
.id-plate .id-scanline-overlay::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 20%;
    background: linear-gradient(180deg,
        rgba(104, 228, 255, 0.0) 0%,
        rgba(104, 228, 255, 0.06) 45%,
        rgba(104, 228, 255, 0.12) 50%,
        rgba(104, 228, 255, 0.06) 55%,
        rgba(104, 228, 255, 0.0) 100%);
    animation: id-scanline 3.5s linear infinite;
}
/* Horizontal scan-line texture — matches hp-bg-cover */
.id-plate .id-scanline-overlay::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 2px,
        rgba(255, 255, 255, 0.04) 2px,
        rgba(255, 255, 255, 0.04) 3px
    );
    pointer-events: none;
}
/* Corner accent brackets */
.id-plate::before,
.id-plate::after {
    content: '';
    position: absolute;
    pointer-events: none;
    z-index: 6;
}
.id-plate::before {
    top: 0; left: 0;
    width: 16px; height: 16px;
    border-top: 1.5px solid rgba(104, 228, 255, 0.55);
    border-left: 1.5px solid rgba(104, 228, 255, 0.55);
    animation: id-pulse 2.5s ease-in-out infinite;
}
.id-plate::after {
    bottom: 0; right: 12%;
    width: 16px; height: 16px;
    border-bottom: 1.5px solid rgba(212, 156, 23, 0.50);
    border-right: 1.5px solid rgba(212, 156, 23, 0.50);
    animation: id-pulse 2.5s ease-in-out infinite 1.2s;
}
/* Diagonal cut border overlay — follows the same clip-path, draws
   a visible 1px border along the clipped right/diagonal edges.
   Uses SVG-like polygon with inset coordinates for the border effect. */
.id-plate .id-cut-border {
    position: absolute;
    inset: 0;
    clip-path: polygon(0 0, 86% 0, 100% 22%, 100% 100%, 0 100%);
    border: 1.5px solid rgba(140, 142, 130, 0.55);
    border-radius: 6px 0 2px 6px;
    pointer-events: none;
    z-index: 8;
}
/* Top row: SYSTEM label + profession */
.id-plate .id-top-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 1px;
    z-index: 2;
    position: relative;
}
.id-plate .id-sys {
    font-size: 10px;
    font-weight: bold;
    font-family: var(--font-sao);
    color: rgba(97, 98, 86, 0.55);
    letter-spacing: 3px;
    text-transform: uppercase;
}
.id-plate .id-prof {
    font-size: 13px;
    font-weight: bold;
    font-family: var(--font-ui);
    color: rgba(225, 165, 30, 0.92);
    text-shadow: 0 0 6px rgba(243, 175, 18, 0.3);
    letter-spacing: 1.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
/* Name row */
.id-plate .id-name {
    font-size: 24px;
    font-weight: bold;
    font-family: var(--font-ui);
    line-height: 1.15;
    color: rgba(60, 62, 50, 1);
    text-shadow: 0 0 6px rgba(255,255,255,0.2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 90%;
    z-index: 2;
    position: relative;
}
/* Level + UID row */
.id-plate .id-info-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-top: 3px;
    z-index: 2;
    position: relative;
}
.id-plate .id-lv {
    font-size: 16px;
    font-family: var(--font-sao);
    color: rgba(212, 156, 23, 0.92);
    letter-spacing: 2px;
}
.id-plate .id-uid {
    font-size: 11px;
    color: rgba(97, 98, 86, 0.55);
    letter-spacing: 1px;
    font-family: var(--font-sao);
}
/* Bottom link */
.id-plate .id-link {
    font-size: 9px;
    font-family: var(--font-sao);
    color: rgba(88, 152, 190, 0.85);
    letter-spacing: 1.5px;
    margin-top: 2px;
    z-index: 2;
    position: relative;
    animation: id-pulse 4s ease-in-out infinite 0.5s;
}

/* ═══ STA bar row — gold SAO style below HP ═══ */
.sta-row {
    position: absolute;
    bottom: 2px;
    left: 46%;
    width: 480px;
    height: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    pointer-events: none;
    font-family: var(--font-ui);
    opacity: 1.0;
    z-index: 2;
}
.sta-pip {
    display: inline-block;
    width: 5px;
    height: 5px;
    border: 1px solid rgba(212, 156, 23, 0.75);
    transform: rotate(45deg);
    flex-shrink: 0;
}
.sta-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(212, 156, 23, 0.82);
    flex-shrink: 0;
}
.sta-track {
    flex: 1;
    height: 6px;
    background: rgba(207, 208, 197, 1.0);
    border: 1px solid rgba(212, 156, 23, 0.25);
    border-radius: 1px;
    overflow: hidden;
    box-shadow: inset 0 0 6px rgba(0,0,0,0.12);
}
.sta-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(to right, rgb(212, 170, 50), rgb(243, 195, 72));
    transition: width 0.3s ease;
    box-shadow: 0 0 6px rgba(243, 175, 18, 0.25);
}
.sta-text {
    font-size: 9px;
    color: rgba(97, 98, 86, 0.75);
    letter-spacing: 1px;
    min-width: 44px;
    text-align: right;
    flex-shrink: 0;
}
</style>
</head>
<body>

<!-- Opaque background cover — hides native HP & STA bars -->
<div class="hp-bg-cover">
    <span class="hp-bg-corner"></span>
</div>

<!-- Identity Plate — SAO sci-fi panel with NErVGear branding -->
<div class="id-plate">
    <div class="id-cut-border"></div>
    <div class="id-scanline-overlay"></div>
    <div class="id-top-row">
        <div class="id-sys" id="id-sys">SYSTEM</div>
        <div class="id-prof" id="id-prof"></div>
    </div>
    <div class="id-name" id="id-name">Player</div>
    <div class="id-info-row">
        <div class="id-lv" id="id-lv">Lv.1</div>
        <div class="id-uid" id="id-uid"></div>
    </div>
    <div class="id-link" id="id-link">NErVGear ─ LINK OK</div>
</div>

<!-- HP Component -->
<div class="XTBox" id="hp">
    <div class="xt_left"></div>
    <div class="xt_right"><span id="username">Player</span></div>
    <div class="number_xt">
        <div id="hp-value">0/0</div>
        <div id="hp-level">lv.1</div>
    </div>
    <div class="xt_border">
        <div class="xt_border_left"></div>
        <div class="xt_border_right">
            <div class="tb_line"></div>
            <div class="xt_in xt_in_green" id="hp-fill" style="width:100%"></div>
            <div class="tb_line"></div>
        </div>
    </div>
    <svg height="27px" width="350px" class="svg_border">
        <polygon points="0,0 350,0 345,19 145,19 141,27 0,27"
                 style="fill:none;stroke:rgb(218,215,215);stroke-width:1;"/>
    </svg>
</div>

<!-- STA bar — covers stamina bar below HP -->
<div class="sta-row" id="sta-row">
    <span class="sta-pip"></span>
    <span class="sta-label">STA</span>
    <div class="sta-track"><div class="sta-fill" id="sta-fill" style="width:100%"></div></div>
    <span class="sta-text" id="sta-text">0/0</span>
</div>

<!-- Skill Bar — SAO frosted-glass skill slots -->
<div class="skill-bar" id="skill-bar"></div>

<!-- Level Up Overlay -->
<div id="lv-overlay">
    <div class="lv-content">
        <div class="lv-title">LEVEL UP!</div>
        <div class="lv-num" id="lv-num">Lv.1 → Lv.2</div>
    </div>
</div>

<!-- Context Menu -->
<div class="context-menu" id="ctx-menu">
    <div class="cm-item" data-action="menu"><span class="cm-icon mi-menu"></span>SAO 菜单</div>
    <div class="cm-sep"></div>
    <div class="cm-item" data-action="toggle_recognition"><span class="cm-icon mi-play"></span>识别 开/关</div>
    <div class="cm-sep"></div>
    <div class="cm-item" data-action="exit"><span class="cm-icon mi-exit"></span>退出</div>
</div>

<script>
/* ═══ HP Bar API ═══ */
function updateHP(current, total, level) {
    var el = document.getElementById('hp-value');
    el.textContent = Math.floor(current) + '/' + Math.floor(total);
    var lvStr = (typeof level === 'string') ? level : ('' + level);
    document.getElementById('hp-level').textContent = 'lv.' + lvStr;
    // sync identity plate level
    document.getElementById('id-lv').textContent = 'Lv.' + lvStr;

    var pct = total > 0 ? Math.round(current / total * 100) : 100;
    var fill = document.getElementById('hp-fill');
    if (pct <= 0) fill.style.width = '0%';
    else if (pct >= 99.7) fill.style.width = '100%';
    else fill.style.width = 'calc(' + pct + '% + 8px)';
    fill.classList.toggle('is-empty', pct <= 0);
    fill.classList.toggle('is-full', pct >= 99.7);
    fill.classList.remove('xt_in_green', 'xt_in_yellow', 'xt_in_red');
    if (pct < 25) fill.classList.add('xt_in_red');
    else if (pct < 60) fill.classList.add('xt_in_yellow');
    else fill.classList.add('xt_in_green');
}

function setUsername(name) {
    document.getElementById('username').textContent = name;
    document.getElementById('id-name').textContent = name;
}

/* ═══ Player Info API (profession, UID) ═══ */
function setPlayerInfo(info) {
    if (info.profession) {
        document.getElementById('id-prof').textContent = info.profession;
    }
    if (info.uid) {
        document.getElementById('id-uid').textContent = 'UID ' + info.uid;
    }
    if (info.name) {
        document.getElementById('username').textContent = info.name;
        document.getElementById('id-name').textContent = info.name;
    }
}

/* ═══ STA Bar API ═══ */
function updateSTA(current, total) {
    var pct = total > 0 ? Math.round(current / total * 100) : 100;
    document.getElementById('sta-fill').style.width = pct + '%';
    document.getElementById('sta-text').textContent = Math.floor(current) + '/' + Math.floor(total);
    scheduleHitRegionReport();
}

/* ═══ Skill Bar API ═══ */
function updateSkillBar(slots) {
    /* slots = [{index, cooldown_pct, active, name}, ...] */
    var bar = document.getElementById('skill-bar');
    if (!slots || slots.length === 0) {
        bar.classList.remove('visible');
        scheduleHitRegionReport();
        return;
    }
    bar.classList.add('visible');

    /* rebuild if slot count changed */
    if (bar.childElementCount !== slots.length) {
        bar.innerHTML = '';
        for (var i = 0; i < slots.length; i++) {
            var d = document.createElement('div');
            d.className = 'skill-slot ready';
            d.innerHTML = '<div class="sk-cd"></div><span class="sk-idx">' + (i + 1) + '</span>';
            bar.appendChild(d);
        }
    }
    /* update each slot */
    var children = bar.children;
    for (var i = 0; i < slots.length && i < children.length; i++) {
        var el = children[i];
        var cd = slots[i].cooldown_pct || 0;
        var active = slots[i].active || false;
        el.querySelector('.sk-cd').style.height = Math.round(cd * 100) + '%';
        el.classList.toggle('active', active);
        el.classList.toggle('cooling', cd > 0.02);
        el.classList.toggle('ready', cd <= 0.02 && !active);
    }
    scheduleHitRegionReport();
}

function setPlayState(state) {
    var hp = document.getElementById('hp');
    hp.classList.remove('playing', 'paused');
    if (state === 'playing') hp.classList.add('playing');
    else if (state === 'paused') hp.classList.add('paused');
}

/* ═══ Sound via Python bridge ═══ */
function snd(name) {
    try {
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.play_sound(name);
        }
    } catch(e) {}
}

/* ═══ Context Menu helpers ═══ */
var ctxMenu = document.getElementById('ctx-menu');
var _exitPending = false;
var _hitRegionTimer = null;
var _hitRegionBootTimer = null;
var _hitRegionBootTries = 0;

function _isVisibleForHit(el) {
    if (!el) return false;
    if (el.id === 'skill-bar' && !el.classList.contains('visible')) return false;
    if (el.id === 'ctx-menu' && !el.classList.contains('show')) return false;
    var style = window.getComputedStyle(el);
    if (!style || style.display === 'none' || style.visibility === 'hidden') return false;
    var rect = el.getBoundingClientRect();
    return rect.width >= 2 && rect.height >= 2;
}

function collectHitRegions() {
    var selectors = [
        '.hp-bg-cover',
        '.id-plate',
        '#hp',
        '#sta-row',
        '#skill-bar',
        '#ctx-menu'
    ];
    var regions = [];
    selectors.forEach(function(sel) {
        var el = document.querySelector(sel);
        if (!_isVisibleForHit(el)) return;
        var rect = el.getBoundingClientRect();
        regions.push({
            left: Math.round(rect.left),
            top: Math.round(rect.top),
            width: Math.round(rect.width),
            height: Math.round(rect.height)
        });
    });
    return regions;
}

function reportHitRegions() {
    _hitRegionTimer = null;
    try {
        if (window.pywebview && window.pywebview.api && window.pywebview.api.set_hit_regions) {
            window.pywebview.api.set_hit_regions(collectHitRegions());
        } else {
            scheduleHitRegionReport();
        }
    } catch (e) {}
}

function scheduleHitRegionReport() {
    if (_hitRegionTimer) clearTimeout(_hitRegionTimer);
    _hitRegionTimer = setTimeout(reportHitRegions, 30);
}

function startHitRegionBootRetry() {
    if (_hitRegionBootTimer) clearInterval(_hitRegionBootTimer);
    _hitRegionBootTries = 0;
    _hitRegionBootTimer = setInterval(function() {
        _hitRegionBootTries += 1;
        scheduleHitRegionReport();
        if (_hitRegionBootTries >= 20) {
            clearInterval(_hitRegionBootTimer);
            _hitRegionBootTimer = null;
        }
    }, 250);
}

function retriggerEntryBlur() {
    var hp = document.getElementById('hp');
    hp.classList.remove('hp-reenter');
    hp.classList.remove('hp-exit');
    void hp.offsetWidth;
    hp.classList.add('hp-reenter');
}

function preExit() {
    var hp = document.getElementById('hp');
    hp.classList.remove('hp-reenter');
    hp.classList.remove('hp-exit');
    void hp.offsetWidth;
    hp.classList.add('hp-exit');
}

function exitApplication() {
    if (_exitPending) return;
    _exitPending = true;
    hideCtxMenu();
    snd('menu_close');
    preExit();
    setTimeout(function() {
        if (window.pywebview && window.pywebview.api && window.pywebview.api.exit_app) {
            window.pywebview.api.exit_app();
        } else if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.context_action('exit');
        }
    }, 260);
}

function showCtxMenu(x, y) {
    if (ctxMenu.classList.contains('show')) {
        hideCtxMenu();
        return;
    }
    setTimeout(function() {
        ctxMenu.classList.add('show');
        var pad = 18;
        var rect = ctxMenu.getBoundingClientRect();
        var posX = Math.min(Math.max(pad, x), Math.max(pad, window.innerWidth - rect.width - pad));
        /* Always open upward: menu bottom near click y */
        var posY = y - rect.height - 12;
        if (posY < pad) posY = pad;
        ctxMenu.style.left = posX + 'px';
        ctxMenu.style.top  = posY + 'px';
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.set_ctx_menu_active(true, {
                left: Math.round(posX),
                top: Math.round(posY),
                width: Math.round(rect.width),
                height: Math.round(rect.height)
            });
        }
        scheduleHitRegionReport();
    }, 50);
}

function hideCtxMenu() {
    ctxMenu.classList.remove('show');
    if (window.pywebview && window.pywebview.api) {
        window.pywebview.api.set_ctx_menu_active(false);
    }
    scheduleHitRegionReport();
}

/* ═══ Click (NO drag — fixed position) ═══ */
(function() {
    var hp = document.getElementById('hp');
    hp.addEventListener('click', function(e) {
        if (ctxMenu.contains(e.target)) return;
        snd('click');
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.toggle_menu();
        }
    });
})();

/* ═══ Right-click → context menu ═══ */
document.getElementById('hp').addEventListener('contextmenu', function(e) {
    e.preventDefault();
    e.stopPropagation();
    snd('click');
    showCtxMenu(e.clientX + 4, e.clientY - 26);
});

/* ═══ Click outside → hide menu ═══ */
document.addEventListener('click', function(e) {
    if (!ctxMenu.contains(e.target) && ctxMenu.classList.contains('show')) {
        hideCtxMenu();
    }
});

/* ═══ Menu item actions ═══ */
ctxMenu.querySelectorAll('.cm-item').forEach(function(item) {
    item.addEventListener('click', function(e) {
        e.stopPropagation();
        hideCtxMenu();
        snd('click');
        var action = this.getAttribute('data-action');
        if (action === 'exit') {
            exitApplication();
            return;
        }
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.context_action(action);
        }
    });
});

window.addEventListener('resize', scheduleHitRegionReport);
window.addEventListener('pywebviewready', function() {
    scheduleHitRegionReport();
    startHitRegionBootRetry();
});
window.addEventListener('load', function() {
    scheduleHitRegionReport();
    setTimeout(scheduleHitRegionReport, 120);
    startHitRegionBootRetry();
});

/* ═══ Level Up Animation ═══ */
var _lvTimer = null;
function showLevelUp(oldLv, newLv) {
    var ov = document.getElementById('lv-overlay');
    document.getElementById('lv-num').textContent = 'Lv.' + oldLv + ' → Lv.' + newLv;
    ov.classList.remove('show');
    void ov.offsetWidth;  /* reflow 重启动画 */
    ov.classList.add('show');
    if (_lvTimer) clearTimeout(_lvTimer);
    _lvTimer = setTimeout(function() { ov.classList.remove('show'); }, 2700);
}

window.HP = {
    retriggerEntryBlur: retriggerEntryBlur,
    preExit: preExit,
    exitApp: exitApplication,
};
</script>
</body>
</html>
