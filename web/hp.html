<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HP</title>
<style>
/* ═══ Reset ═══ */
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ═══ SAO Fonts ═══ */
@font-face {
    font-family: 'sao';
    src: url('fonts/SAOUI.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
}
@font-face {
    font-family: 'saoLatin';
    src: url('fonts/SAOUI.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
    unicode-range: U+0000-00FF, U+0100-024F, U+1E00-1EFF, U+2000-206F, U+20A0-20CF;
}
@font-face {
    font-family: 'yuanJWD';
    src: url('fonts/ZhuZiAYuanJWD.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
}
@font-face {
    font-family: 'yuanJWDCJK';
    src: url('fonts/ZhuZiAYuanJWD.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
    unicode-range: U+2E80-2EFF, U+3000-303F, U+31C0-31EF, U+3400-4DBF, U+4E00-9FFF, U+F900-FAFF;
}

:root {
    --font-sao: 'saoLatin', 'sao', 'Segoe UI', sans-serif;
    --font-ui: 'saoLatin', 'sao', 'yuanJWDCJK', 'yuanJWD', 'Segoe UI', sans-serif;
    --panel-a: rgba(247, 248, 249, 1);
    --panel-mid: rgba(236, 238, 240, 1);
    --panel-b: rgba(226, 229, 232, 1);
    --panel-edge: rgba(186, 190, 196, 0.52);
    --panel-shadow: rgba(18, 24, 32, 0.20);
    --box-bg: rgba(249, 249, 250, 1);
    --box-hover: rgba(243, 245, 247, 1);
    --line: rgb(214, 216, 219);
}
.theme-dark {
    --panel-a: rgba(20, 26, 36, 1);
    --panel-mid: rgba(16, 22, 32, 1);
    --panel-b: rgba(12, 18, 28, 1);
    --panel-edge: rgba(50, 80, 110, 0.52);
    --panel-shadow: rgba(0, 0, 0, 0.35);
    --box-bg: rgba(22, 30, 42, 1);
    --box-hover: rgba(30, 40, 55, 1);
    --line: rgb(50, 70, 90);
}

/* ═══ Body — native pywebview transparency ═══
   transparent=True 已由 pywebview 设置 WebView2 透明背景.
   html/body 保持 transparent, 不要用 rgb(1,0,1) 色键颜色——
   WebView2 会把色键颜色渲染成灰色而非穿透. */
html, body {
    background: transparent;
    user-select: none;
    -webkit-user-select: none;
    margin: 0;
    padding: 0;
    overflow: visible;
    scrollbar-width: none;
    -ms-overflow-style: none;
}
html::-webkit-scrollbar, body::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
}

body {
    padding: 0;
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
}

.hud-stage {
    position: fixed;
    left: 4vw;
    bottom: 0;
    width: 75vw;
    height: 520px;
    pointer-events: none;
    overflow: visible;
}

/* ═══════════════════════════════════════
   HP Component — exact copy from SAO-UI
   packages/HP/src/index.vue
   ═══════════════════════════════════════ */
/* ═══ Entry Animation ═══ */
@keyframes hp-slide-in {
    0%   { opacity: 0; transform: scale(0.82); filter: drop-shadow(0 0 0 rgba(50, 50, 0, 0)); }
    60%  { opacity: 1; transform: scale(1.02); filter: drop-shadow(3px 6px 12px rgba(50, 50, 0, 0.32)); }
    100% { opacity: 1; transform: scale(1); filter: drop-shadow(2px 4px 3px rgba(50, 50, 0, 0.5)); }
}

@keyframes hp-restore-in {
    0%   { opacity: 0; transform: scale(0.96) translateX(8px); filter: drop-shadow(0 0 0 rgba(50, 50, 0, 0)); }
    100% { opacity: 1; transform: scale(1) translateX(0); filter: drop-shadow(2px 4px 3px rgba(50, 50, 0, 0.5)); }
}

@keyframes hp-live-blur {
    0%   { filter: drop-shadow(2px 4px 3px rgba(50, 50, 0, 0.5)); }
    25%  { filter: drop-shadow(1px 6px 8px rgba(50, 50, 0, 0.38)); }
    50%  { filter: drop-shadow(2px 4px 4px rgba(50, 50, 0, 0.46)); }
    75%  { filter: drop-shadow(3px 5px 8px rgba(50, 50, 0, 0.36)); }
    100% { filter: drop-shadow(2px 4px 3px rgba(50, 50, 0, 0.5)); }
}

@keyframes hp-exit-blur {
    0%   { opacity: 1; transform: scale(1); filter: drop-shadow(2px 4px 3px rgba(50, 50, 0, 0.5)); }
    55%  { opacity: 0.88; transform: scale(1.02) translate(10px, -4px); filter: drop-shadow(4px 8px 14px rgba(50, 50, 0, 0.34)); }
    100% { opacity: 0; transform: scale(0.9) translate(22px, -8px); filter: drop-shadow(0 0 0 rgba(50, 50, 0, 0)); }
}
/* ═══ Idle Float REMOVED — fixed position ═══ */

.XTBox {
    --bgColor: var(--box-bg);
    --fontcolor: rgba(100, 99, 100, 1);
    --hover: var(--box-hover);
    position: absolute;
    bottom: 22px;
    left: calc(47% + 25px);
    width: 518px;
    height: 48px;
    display: flex;
    filter: drop-shadow(2px 4px 3px rgba(18, 24, 32, 0.20));
    font-family: var(--font-ui);
    letter-spacing: 1px;
    color: var(--fontcolor);
    font-size: 14px;
    cursor: pointer;
    z-index: 2;
    animation: hp-slide-in 0.6s cubic-bezier(0.22, 1, 0.36, 1) both,
               hp-live-blur 8.5s ease-in-out 0.7s infinite;
}

.XTBox.hp-reenter {
    animation: hp-slide-in 0.6s cubic-bezier(0.22, 1, 0.36, 1) both,
               hp-live-blur 8.5s ease-in-out 0.7s infinite;
}

.XTBox.hp-restore {
    animation: hp-restore-in 0.18s cubic-bezier(0.22, 1, 0.36, 1) both,
               hp-live-blur 8.5s ease-in-out 0.18s infinite;
}

.XTBox.hp-exit {
    animation: hp-exit-blur 0.28s cubic-bezier(0.4, 0, 0.2, 1) both;
}

.xt_left, .xt_right, .number_xt { height: 100%; }

.xt_left {
    width: 26px;
    clip-path: polygon(0% 25%, 50% 25%, 50% 75%, 0% 75%, 0% 100%, 100% 100%, 100% 0%, 0% 0%);
    margin-right: 3px;
    background: var(--bgColor);
    transition: background 0.15s ease;
}

.xt_right {
    flex: 1;
    clip-path: polygon(85px 22%, 100% 22%, 100% 0%, 0% 0%, 0 100%, 228px 100%, 234px 77%, 100% 77%, 100% 60%, 233px 60%, 228px 77%, 85px 77%);
    background: linear-gradient(to right, var(--bgColor) 50%, rgba(249, 249, 250, 0));
    display: flex;
    align-items: center;
    user-select: none;
    transition: background 0.15s ease;
}

.xt_right > span {
    min-width: 80px;
    max-width: 85px;
    text-align: center;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
    padding-left: 10px;
}

.number_xt {
    position: absolute;
    top: 82%;
    left: 58%;
    width: 220px;
    height: 20px;
    display: flex;
    overflow: hidden;
    clip-path: polygon(14px 0, 100% 0, 100% 100%, 0 100%, 0 58%);
}

.number_xt > div {
    background: var(--bgColor);
    box-shadow: -4px 3px 27px 3px rgba(0, 0, 0, 0.1);
    padding-right: 5px;
    text-align: right;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
    user-select: none;
    transition: background 0.15s ease;
}

.number_xt div:nth-child(1) { width: 55%; margin-right: 3px; }
.number_xt div:nth-child(2) { width: 44%; font-size: 12px; padding-left: 4px; text-align: left; }

/* ═══ Hover ═══ */
.XTBox:hover .xt_left,
.XTBox:hover .number_xt div {
    background: var(--hover);
}
.XTBox:hover .xt_right {
    background: linear-gradient(to right, var(--hover) 50%, rgba(243, 245, 247, 0));
}
.XTBox:hover .xt_border { opacity: .8; }

/* ═══ SVG border ═══ */
.svg_border {
    position: absolute;
    left: 114px;
    top: 10px;
}

/* ═══ HP bar border + fill ═══ */
.xt_border {
    position: absolute;
    left: 114px;
    top: 10px;
    width: 350px;
    height: 27px;
    clip-path: polygon(0 0, 100% 0, calc(100% - 5px) 19px, 145px 19px, 141px 100%, 0 100%);
    overflow: hidden;
    opacity: 1.0;
    transition: opacity 0.15s ease;
}

.xt_border_left {
    position: absolute;
    left: 0;
    top: 0;
    width: 1.5px;
    height: 100%;
    background: var(--line);
    z-index: 3;
}

.xt_border_right {
    position: absolute;
    inset: 0;
    z-index: 1;
}

.tb_line {
    width: 100%;
    height: 1px;
    background: var(--line);
}

.xt_in {
    height: 25px;
    width: 100%;
    position: relative;
    transition: width 0.3s ease, background 0.3s ease;
}
.xt_in::after {
    content: '';
    position: absolute;
    top: 0;
    right: -11px;
    width: 18px;
    height: 100%;
    background: inherit;
    transform: skewX(-14deg);
    pointer-events: none;
}
.xt_in.is-empty::after {
    display: none;
}
.xt_in.is-full {
    width: calc(100% + 6px) !important;
}

.xt_in_green {
    background: linear-gradient(to right, rgb(211, 234, 124), rgb(154, 211, 52));
}
.xt_in_yellow {
    background: linear-gradient(to right, rgb(235, 238, 112), rgb(244, 250, 73));
}
.xt_in_red {
    background: linear-gradient(to right, rgb(248, 140, 122), rgb(239, 104, 78));
}

/* ═══ Opaque background cover — hides native HP & STA bars ═══ */
.hp-bg-cover {
    position: absolute;
    bottom: 0;
    left: calc(45.2% + 25px);
    width: 586px;
    height: 74px;
    background: linear-gradient(
        175deg,
        var(--panel-a) 0%,
        var(--panel-mid) 45%,
        var(--panel-b) 100%
    );
    z-index: 0;
    pointer-events: none;
    border-radius: 6px 6px 2px 2px;
    box-shadow:
        2px 3px 18px var(--panel-shadow),
        inset 0 0 22px rgba(255, 255, 255, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.38);
    border: 1px solid var(--panel-edge);
    overflow: hidden;
}
.hp-bg-corner {
    position: absolute;
    right: 2px;
    bottom: 2px;
    width: 16px;
    height: 16px;
    border-bottom: 1.5px solid rgba(212, 156, 23, 0.50);
    border-right: 1.5px solid rgba(212, 156, 23, 0.50);
    pointer-events: none;
    border-radius: 0 0 3px 0;
}
/* SAO scan-line overlay */
.hp-bg-cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 2px,
        rgba(255, 255, 255, 0.04) 2px,
        rgba(255, 255, 255, 0.04) 3px
    );
    pointer-events: none;
}
/* SAO corner markers */
.hp-bg-cover::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    border-top: 1.5px solid rgba(104, 228, 255, 0.55);
    border-left: 1.5px solid rgba(104, 228, 255, 0.55);
    pointer-events: none;
    border-radius: 3px 0 0 0;
}
/* Gold corner (bottom-right) via box-shadow trick */

#hp,
#ctx-menu {
    pointer-events: auto;
}

/* HUD lane float keyframes removed — fixed positions */

.hp-hud {
    position: absolute;
    inset: -18px -10px -12px -10px;
    pointer-events: none;
    overflow: visible;
}
.hp-hud-lane {
    position: absolute;
    width: 112px;
    height: 18px;
    border: 1px solid rgba(104, 228, 255, 0.34);
    clip-path: polygon(0 14%, 88% 14%, 100% 0, 100% 100%, 10% 100%, 0 78%);
    box-shadow: inset 0 0 12px rgba(104, 228, 255, 0.08);
}
.hp-hud-lane::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0) 0 10px, rgba(255,255,255,.10) 10px 11px, rgba(255,255,255,0) 11px 18px);
    opacity: .28;
}
.hp-hud-lane.gold {
    border-color: rgba(243, 175, 18, 0.34);
    box-shadow: inset 0 0 12px rgba(243, 175, 18, 0.08);
}
.hp-hud-label {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    font-family: var(--font-ui);
    font-size: 10px;
    letter-spacing: 1px;
    color: rgba(104, 228, 255, 0.78);
}
.hp-hud-lane.gold .hp-hud-label { color: rgba(243, 175, 18, 0.82); }
.hp-left-far { left: -6px; top: 4px; }
.hp-left-near { left: 10px; bottom: -8px; }
.hp-right-far { right: -8px; top: 22px; }
.hp-right-near { right: 4px; bottom: 2px; }

/* ═══ Playing status indicator ═══ */
@keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1.0; }
}
.XTBox.playing .xt_left {
    background: rgba(154, 211, 52, 0.6);
    animation: pulse 1.5s ease-in-out infinite;
}
.XTBox.paused .xt_left {
    background: rgba(244, 250, 73, 0.6);
}

/* ═══ Context Menu — SAO frosted-glass frame, opens upward ═══ */
.context-menu {
    display: none;
    position: fixed;
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border: 1px solid rgba(104, 228, 255, 0.25);
    border-radius: 2px;
    box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.18),
                inset 0 0 18px rgba(255, 255, 255, 0.12);
    font-family: var(--font-ui);
    font-size: 12px;
    color: rgba(100, 99, 100, 0.95);
    z-index: 1000;
    min-width: 148px;
    padding: 6px 0;
    -webkit-app-region: no-drag;
}
/* SAO decorative corner lines */
.context-menu::before,
.context-menu::after {
    content: '';
    position: absolute;
    pointer-events: none;
}
.context-menu::before {
    top: -1px; left: -1px;
    width: 18px; height: 18px;
    border-top: 2px solid rgba(104, 228, 255, 0.7);
    border-left: 2px solid rgba(104, 228, 255, 0.7);
}
.context-menu::after {
    bottom: -1px; right: -1px;
    width: 18px; height: 18px;
    border-bottom: 2px solid rgba(243, 175, 18, 0.6);
    border-right: 2px solid rgba(243, 175, 18, 0.6);
}
.context-menu.show { display: block; }
.context-menu .cm-item {
    padding: 4px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
}
.context-menu .cm-item:hover {
    background: rgba(212, 156, 23, 0.18);
    color: rgba(170, 120, 20, 1);
}
.context-menu .cm-sep {
    height: 1px;
    background: rgba(97, 98, 86, 0.15);
    margin: 2px 6px;
}
.context-menu .cm-icon {
    position: relative;
    display: inline-block;
    width: 24px;
    min-width: 24px;
    height: 18px;
    color: rgba(97, 98, 86, 0.85);
    opacity: 0.96;
    filter: drop-shadow(0 0 4px rgba(97, 98, 86, 0.12));
    background:
        linear-gradient(90deg, currentColor, currentColor) left top 3px / 7px 1px no-repeat,
        linear-gradient(90deg, currentColor, currentColor) right bottom 3px / 7px 1px no-repeat,
        linear-gradient(180deg, rgba(97, 98, 86, 0.12), rgba(97, 98, 86, 0)) center / 100% 100% no-repeat;
}
.context-menu .cm-icon::before,
.context-menu .cm-icon::after { content: ''; position: absolute; box-sizing: border-box; border-color: currentColor; }
.context-menu .cm-item:hover .cm-icon {
    color: rgba(170, 120, 20, 1);
    filter: drop-shadow(0 0 8px rgba(212, 156, 23, 0.22));
}
.cm-icon.mi-play::before { left: 7px; top: 2px; width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 8px solid currentColor; }
.cm-icon.mi-stop::before { left: 6px; top: 3px; width: 10px; height: 10px; border: 2px solid currentColor; }
.cm-icon.mi-file::before { left: 5px; top: 2px; width: 12px; height: 12px; border: 2px solid currentColor; }
.cm-icon.mi-file::after { right: 5px; top: 2px; width: 5px; height: 5px; border-top: 2px solid currentColor; border-right: 2px solid currentColor; }
.cm-icon.mi-dir::before { left: 3px; top: 5px; width: 16px; height: 8px; border: 2px solid currentColor; border-radius: 2px; }
.cm-icon.mi-dir::after { left: 5px; top: 2px; width: 7px; height: 5px; border: 2px solid currentColor; border-bottom: none; border-radius: 2px 2px 0 0; }
.cm-icon.mi-speedup::before { left: 10px; top: 2px; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-bottom: 7px solid currentColor; }
.cm-icon.mi-speedup::after { left: 4px; top: 12px; width: 14px; height: 2px; background: currentColor; }
.cm-icon.mi-speeddown::before { left: 10px; top: 7px; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 7px solid currentColor; }
.cm-icon.mi-speeddown::after { left: 4px; top: 2px; width: 14px; height: 2px; background: currentColor; }
.cm-icon.mi-ent::before { left: 5px; top: 3px; width: 12px; height: 10px; border: 2px solid currentColor; clip-path: polygon(25% 0, 75% 0, 100% 50%, 75% 100%, 25% 100%, 0 50%); }
.cm-icon.mi-old::before { left: 4px; top: 3px; width: 11px; height: 11px; border: 2px solid currentColor; border-left-color: transparent; border-radius: 50%; }
.cm-icon.mi-old::after { right: 3px; top: 2px; width: 0; height: 0; border-left: 5px solid currentColor; border-top: 3px solid transparent; border-bottom: 3px solid transparent; }
.cm-icon.mi-rank::before { left: 3px; bottom: 2px; width: 4px; height: 5px; border: 2px solid currentColor; box-shadow: 6px -3px 0 -2px currentColor, 12px -6px 0 -2px currentColor; }
.cm-icon.mi-exit::before, .cm-icon.mi-exit::after { left: 10px; top: 1px; width: 2px; height: 14px; background: currentColor; }
.cm-icon.mi-exit::before { transform: rotate(45deg); }
.cm-icon.mi-exit::after { transform: rotate(-45deg); }
.cm-icon.mi-menu::before { left: 4px; top: 3px; width: 14px; height: 2px; background: currentColor; box-shadow: 0 4px 0 currentColor, 0 8px 0 currentColor; }

/* ═══ Burst Mode Ready — SAO scan effect + diagonal line + text ═══ */
#burst-overlay {
    display: none;
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 12;
    overflow: visible;
}
#burst-overlay.show {
    display: block;
}
/* SAO scan line sweeping from left to right */
@keyframes burst-scan {
    0%   { left: -30%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { left: 110%; opacity: 0; }
}
.burst-scan-line {
    position: absolute;
    top: 0;
    left: -30%;
    width: 2px;
    height: 100%;
    background: linear-gradient(180deg, rgba(104,228,255,0) 0%, rgba(104,228,255,0.9) 50%, rgba(104,228,255,0) 100%);
    box-shadow: 0 0 12px rgba(104,228,255,0.6), 0 0 32px rgba(104,228,255,0.3);
    animation: burst-scan 1.2s cubic-bezier(0.4,0,0.2,1) forwards;
}
/* Diagonal line from bottom-left to upper-right */
@keyframes burst-diag-in {
    0%   { opacity: 0; }
    32%  { opacity: 1; }
    100% { opacity: 0.84; }
}
.burst-diag {
    position: absolute;
    bottom: 8px;
    left: 0;
    width: 260px;
    height: 1.5px;
    background: linear-gradient(90deg, rgba(104,228,255,0.8), rgba(243,175,18,0.6));
    transform-origin: left center;
    transform: rotate(-12deg) scaleX(0);
    animation: burst-diag-in 0.6s 0.3s cubic-bezier(0.22,1,0.36,1) forwards;
    box-shadow: 0 0 8px rgba(104,228,255,0.4);
}
/* Text label */
@keyframes burst-text-in {
    0%   { opacity: 0; transform: translateX(-26px); }
    55%  { opacity: 1; transform: translateX(6px); }
    100% { opacity: 1; transform: translateX(0); }
}
@keyframes burst-text-glow {
    0%, 100% { text-shadow: 0 0 10px rgba(104,228,255,0.45), 0 0 28px rgba(104,228,255,0.18); }
    50%      { text-shadow: 0 0 18px rgba(104,228,255,0.72), 0 0 42px rgba(104,228,255,0.28); }
}
@keyframes burst-fadeout {
    0%   { opacity: 1; }
    100% { opacity: 0; }
}
.burst-text {
    position: absolute;
    top: 6px;
    left: 16px;
    font-family: var(--font-sao);
    font-size: 18px;
    letter-spacing: 3px;
    color: rgba(104, 228, 255, 0.95);
    white-space: nowrap;
    opacity: 0;
    animation: burst-text-in 0.5s 0.5s cubic-bezier(0.22,1,0.36,1) forwards,
               burst-text-glow 2s 1s ease-in-out infinite;
}
#burst-overlay.fadeout {
    animation: burst-fadeout 0.5s ease forwards;
}

@keyframes burst-ring-pulse {
    0%   { opacity: 0; transform: scale(0.76); }
    18%  { opacity: 1; transform: scale(1.00); }
    70%  { opacity: 1; transform: scale(1.12); }
    100% { opacity: 0; transform: scale(1.24); }
}
@keyframes burst-ring-inner {
    0%   { opacity: 0; transform: scale(0.68); }
    22%  { opacity: 1; transform: scale(0.94); }
    100% { opacity: 0; transform: scale(1.08); }
}
@keyframes burst-target-scan {
    0%   { opacity: 0; transform: translateX(-44px); }
    14%  { opacity: 1; }
    100% { opacity: 0; transform: translateX(44px); }
}
.burst-target {
    position: fixed;
    width: 96px;
    height: 96px;
    transform: translate(-50%, -50%);
}
.burst-target-ring {
    position: absolute;
    inset: 0;
    border-radius: 999px;
}
.burst-target-ring.outer {
    border: 2px solid rgba(104, 228, 255, 0.95);
    box-shadow: 0 0 10px rgba(104,228,255,0.55), 0 0 28px rgba(104,228,255,0.24);

.burst-target-ring.inner {

.burst-target-scan {

.burst-diag {

    transform-origin: left center;

/* ═══ Level Up Overlay ═══ */

/* ═══ Identity Plate — SAO sci-fi panel with depth ═══ */
@keyframes id-scanline {
    0%   { transform: translateY(-100%); }
    100% { transform: translateY(400%); }
}
@keyframes id-pulse {
    0%, 100% { opacity: 0.6; }
    50%      { opacity: 1.0; }
}
@keyframes id-data-stream {
    0%   { background-position: 0 0; }
    100% { background-position: 200px 0; }
}
.id-plate {
    position: absolute;
    bottom: 2px;
    left: calc(3.2% - 25px);
    width: calc(39.6% + 55px);
    height: 74px;
    background: linear-gradient(
        175deg,
        var(--panel-a) 0%,
        var(--panel-mid) 45%,
        var(--panel-b) 100%);
    clip-path: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 9px 32px 8px 24px;
    font-family: var(--font-ui);
    color: rgba(100, 99, 100, 1);
    letter-spacing: 1.5px;
    pointer-events: auto;
    cursor: pointer;
    /* box-shadow 被 clip-path 裁剪, 用 filter:drop-shadow 代替 —
       drop-shadow 在 clip-path 裁剪后应用, 因此右侧斜角也有阴影/描边效果 */
    filter: drop-shadow(2px 3px 14px rgba(18, 24, 32, 0.22))
            drop-shadow(0 0 1px rgba(186, 190, 196, 0.42));
    box-shadow:
        inset 0 0 22px rgba(255, 255, 255, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.38);
    border: 1px solid var(--panel-edge);
    z-index: 1;
    border-radius: 6px;
    overflow: hidden;
    transition: filter 0.15s ease, opacity 0.15s ease;
    user-select: none;
    -webkit-user-select: none;
}
.id-plate:hover {
    filter: drop-shadow(2px 3px 14px rgba(0, 0, 0, 0.38))
            drop-shadow(0 0 2px rgba(104, 228, 255, 0.22));
}
.id-plate:active {
    opacity: 0.82;
}
/* Scan-line overlay — matches hp-bg-cover texture */
.id-plate .id-scanline-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 5;
}
.id-plate .id-scanline-overlay::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 20%;
    background: linear-gradient(180deg,
        rgba(104, 228, 255, 0.0) 0%,
        rgba(104, 228, 255, 0.06) 45%,
        rgba(104, 228, 255, 0.12) 50%,
        rgba(104, 228, 255, 0.06) 55%,
        rgba(104, 228, 255, 0.0) 100%);
    animation: id-scanline 3.5s linear infinite;
}
/* Horizontal scan-line texture — matches hp-bg-cover */
.id-plate .id-scanline-overlay::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 2px,
        rgba(255, 255, 255, 0.04) 2px,
        rgba(255, 255, 255, 0.04) 3px
    );
    pointer-events: none;
}
/* Corner accent brackets */
.id-plate::before,
.id-plate::after {
    content: '';
    position: absolute;
    pointer-events: none;
    z-index: 6;
}
.id-plate::before {
    top: 0; left: 0;
    width: 16px; height: 16px;
    border-top: 1.5px solid rgba(104, 228, 255, 1);
    border-left: 1.5px solid rgba(104, 228, 255, 1);

.id-plate::after {

    border-right: 1.5px solid rgba(212, 156, 23, 1);

    animation: id-pulse 2.5s ease-in-out infinite 1.2s;
}
/* Diagonal cut border overlay — follows the same clip-path, draws
   a visible 1px border along the clipped right/diagonal edges.
   Uses SVG-like polygon with inset coordinates for the border effect. */
.id-plate .id-cut-border {
    position: absolute;
    inset: 0;
    clip-path: none;
    border: 1.5px solid rgba(140, 142, 130, 0.55);
    border-radius: 6px;
    pointer-events: none;
    z-index: 8;
}
/* Top row: SYSTEM label + profession */
.id-plate .id-top-row {

.id-plate .id-prof {

/* ── Boss Raid Timer / System Clock — centered in id-plate ── */
.id-plate .id-boss-timer {
    position: absolute;

    top: 50%;
    transform: translate(-50%, -50%);

}


/* ═══ HP 组隐藏: 未检测到 STA 条时隐藏 HP 组件 (ID 板保持可见) ═══ */

<script>
/* ═══ HP Bar API ═══ */
function updateHP(current, total, level) {
    var el = document.getElementById('hp-value');
    el.textContent = Math.floor(current) + '/' + Math.floor(total);
    var lvStr = (typeof level === 'string') ? level : ('' + level);
    document.getElementById('hp-level').textContent = 'lv.' + lvStr;
    // sync identity plate level
    document.getElementById('id-lv').textContent = 'Lv.' + lvStr;

    var pct = total > 0 ? Math.round(current / total * 100) : 100;
    var fill = document.getElementById('hp-fill');
    if (pct <= 0) fill.style.width = '0%';
    else if (pct >= 99.7) fill.style.width = '100%';
    else fill.style.width = 'calc(' + pct + '% + 8px)';
    fill.classList.toggle('is-empty', pct <= 0);
    fill.classList.toggle('is-full', pct >= 99.7);
    fill.classList.remove('xt_in_green', 'xt_in_yellow', 'xt_in_red');
    if (pct < 25) fill.classList.add('xt_in_red');
    else if (pct < 60) fill.classList.add('xt_in_yellow');
    else fill.classList.add('xt_in_green');
    scheduleHitRegionReport();
}

function setUsername(name) {
    document.getElementById('username').textContent = name;
    document.getElementById('id-name').textContent = name;
    scheduleHitRegionReport();
}

/* ═══ Player Info API (profession, UID) ═══ */
function setPlayerInfo(info) {
    if (info.profession) {
        document.getElementById('id-prof').textContent = info.profession;
    }
    if (info.uid) {
        document.getElementById('id-uid').textContent = 'UID ' + info.uid;
    }
    if (info.name) {
        document.getElementById('username').textContent = info.name;
        document.getElementById('id-name').textContent = info.name;
    }
    scheduleHitRegionReport();
}

/* ═══ Boss Raid Timer / System Clock API ═══ */
var _bossTimerActive = false;
function setBossTimer(text, urgency) {
    // text = '' → hide boss timer, show clock; urgency = 'normal' | 'urgent'
    var el = document.getElementById('id-boss-timer');
    var link = document.getElementById('id-link');
    if (!text) {
        el.classList.remove('urgent');
        el.classList.add('active');  // keep visible for clock
        if (link) link.style.display = 'none';
        _bossTimerActive = false;
        _updateClock();  // show clock immediately
        return;
    }
    el.textContent = text;
    el.classList.add('active');
    el.classList.toggle('urgent', urgency === 'urgent');
    // Restore boss timer styling (override clock muted style)
    el.style.color = '';
    el.style.textShadow = '';
    if (link) link.style.display = 'none';
    _bossTimerActive = true;
}

function _updateClock() {
    if (_bossTimerActive) return;
    var el = document.getElementById('id-boss-timer');
    if (!el) return;
    var now = new Date();
    var hh = String(now.getHours()).padStart(2, '0');
    var mm = String(now.getMinutes()).padStart(2, '0');
    var ss = String(now.getSeconds()).padStart(2, '0');
    el.textContent = '\u2500 ' + hh + ':' + mm + ':' + ss + ' \u2500';
    el.style.color = 'rgba(97, 98, 86, 0.55)';
    el.style.textShadow = 'none';
    el.style.fontSize = '30px';
    el.style.letterSpacing = '3px';
}
// Start clock — updates every 1s for HH:MM:SS, shows when no boss timer
setInterval(_updateClock, 1000);
// Initial clock display after page loads
setTimeout(function() {
    if (!_bossTimerActive) {
        var el = document.getElementById('id-boss-timer');
        if (el) { el.classList.add('active'); }
        _updateClock();
    }
}, 200);


/* ═══ STA Bar API ═══ */
var _staOffline = false;
var _hpGroupHidden = false;
var _staOfflineHideTimer = null;
var _STA_HIDE_DELAY = 200; // 短防抖后开始隐藏 HP 组，避免 OFFLINE 停留过久

var _hpGroupFadeTimer = null;
var _HP_GROUP_FADE_MS = 500;
var _hpGroupRestoreTimer = null;
var _HP_GROUP_RESTORE_MS = 180;
var _staOfflineDebounceTimer = null;
var _STA_OFFLINE_DEBOUNCE = 100; // ms 防抖: 持续离线才显示 OFFLINE

function _clearHPGroupRestoreClasses(cover, hp, sta) {
    if (cover) cover.classList.remove('hp-restore');
    if (hp)    hp.classList.remove('hp-restore');
    if (sta)   sta.classList.remove('hp-restore');
}

function _restartHPPanelAnimation(hp, mode) {
    if (!hp) return;
    hp.classList.remove('hp-reenter');
    hp.classList.remove('hp-exit');
    hp.classList.remove('hp-restore');
    void hp.offsetWidth;
    if (mode === 'enter') hp.classList.add('hp-reenter');
    else if (mode === 'restore') hp.classList.add('hp-restore');
    else hp.classList.add('hp-exit');
}

function _setHPGroupHidden(hidden) {
    var cover = document.querySelector('.hp-bg-cover');
    var hp    = document.getElementById('hp');
    var sta   = document.getElementById('sta-row');

    if (hidden) {
        if (_hpGroupHidden || _hpGroupFadeTimer) return;
        if (_hpGroupRestoreTimer) {
            clearTimeout(_hpGroupRestoreTimer);
            _hpGroupRestoreTimer = null;
        }
        _clearHPGroupRestoreClasses(cover, hp, sta);
        if (cover) cover.classList.add('hp-fadeout');
        if (sta)   sta.classList.add('hp-fadeout');
        _restartHPPanelAnimation(hp, 'exit');
        _hpGroupFadeTimer = setTimeout(function() {
            _hpGroupFadeTimer = null;
            _hpGroupHidden = true;
            if (cover) {
                cover.classList.add('hp-hidden');
                cover.classList.remove('hp-fadeout');
            }
            if (hp) {
                hp.classList.add('hp-hidden');
                hp.classList.remove('hp-exit');
            }
            if (sta) {
                sta.classList.add('hp-hidden');
                sta.classList.remove('hp-fadeout');
            }
            scheduleHitRegionReport();
        }, _HP_GROUP_FADE_MS);
        scheduleHitRegionReport();
        return;
    }

    if (_hpGroupFadeTimer) {
        clearTimeout(_hpGroupFadeTimer);
        _hpGroupFadeTimer = null;
    }
    if (_hpGroupRestoreTimer) {
        clearTimeout(_hpGroupRestoreTimer);
        _hpGroupRestoreTimer = null;
    }
    if (!_hpGroupHidden &&
        !(cover && cover.classList.contains('hp-fadeout')) &&
        !(hp && hp.classList.contains('hp-exit')) &&
        !(sta && sta.classList.contains('hp-fadeout'))) {
        return;
    }

    _hpGroupHidden = false;
    if (cover) {
        cover.classList.add('hp-restore');
        cover.classList.remove('hp-hidden');
        cover.classList.remove('hp-fadeout');
    }
    if (hp) {
        hp.classList.remove('hp-hidden');
        _restartHPPanelAnimation(hp, 'restore');
    }
    if (sta) {
        sta.classList.add('hp-restore');
        sta.classList.remove('hp-hidden');
        sta.classList.remove('hp-fadeout');
    }
    _hpGroupRestoreTimer = setTimeout(function() {
        _hpGroupRestoreTimer = null;
        _clearHPGroupRestoreClasses(cover, hp, sta);
    }, _HP_GROUP_RESTORE_MS);
    scheduleHitRegionReport();
}

function updateSTA(current, total) {
    var pct = total > 0 ? Math.round(current / total * 100) : 100;
    document.getElementById('sta-fill').style.width = pct + '%';
    // 视觉识图路径会传入 0-100 百分比，而不是 current/max 数值。
    if (total === 100 && current >= 0 && current <= 100) {
        document.getElementById('sta-text').textContent = current + '%';
    } else {
        document.getElementById('sta-text').textContent = Math.floor(current) + '/' + Math.floor(total);
    }
    scheduleHitRegionReport();
}

function setSTAOffline(offline) {
    var row = document.getElementById('sta-row');
    var text = document.getElementById('sta-text');
    if (offline) {
        // 防抖: 延迟显示 OFFLINE 标签, 避免闪烁
        if (!_staOfflineDebounceTimer && !_staOffline) {
            _staOfflineDebounceTimer = setTimeout(function() {
                _staOfflineDebounceTimer = null;
                if (_staOffline) return; // 已被取消
                _staOffline = true;
                row.classList.add('offline');
                text.textContent = 'OFFLINE';
            }, _STA_OFFLINE_DEBOUNCE);
        }
        // 冷却定时器: STA 持续不在线超过阻尼就隐藏 HP 组
        if (!_staOfflineHideTimer) {
            _staOfflineHideTimer = setTimeout(function() {
                _staOfflineHideTimer = null;
                if (_staOffline || _staOfflineDebounceTimer) _setHPGroupHidden(true);
            }, _STA_HIDE_DELAY);
        }
    } else {
        // 立即取消防抖
        if (_staOfflineDebounceTimer) { clearTimeout(_staOfflineDebounceTimer); _staOfflineDebounceTimer = null; }
        if (_staOfflineHideTimer) { clearTimeout(_staOfflineHideTimer); _staOfflineHideTimer = null; }
        if (_staOffline) {
            _staOffline = false;
            row.classList.remove('offline');
        }
        // STA 恢复在线时立即显示 HP 组
        _setHPGroupHidden(false);
    }
}

/* ═══ Burst Mode Ready API ═══ */
var _burstVisible = false;
var _burstTimer = null;
var _burstSkillLayout = { x: 0.335, y: 0.820, w: 0.328, h: 0.128 };
var _burstSlotFractions = [0.085, 0.168, 0.251, 0.334, 0.417, 0.500, 0.625, 0.760, 0.892];

function setBurstSkillLayout(layout) {
    if (!layout || typeof layout !== 'object') return;
    ['x', 'y', 'w', 'h'].forEach(function(key) {
        if (typeof layout[key] === 'number' && isFinite(layout[key])) {
            _burstSkillLayout[key] = layout[key];
        }
    });
}

function _getBurstSkillAnchor(slotIndex) {
    var idx = Math.max(1, Math.min(9, parseInt(slotIndex || 1, 10) || 1)) - 1;
    var x = (_burstSkillLayout.x + _burstSkillLayout.w * _burstSlotFractions[idx]) * window.innerWidth;
    var y = (_burstSkillLayout.y + _burstSkillLayout.h * 0.52) * window.innerHeight;
    var radius = idx >= 6 ? 46 : 34;
    return { x: x, y: y, radius: radius };
}

function _positionBurstReady(slotIndex) {
    var anchor = _getBurstSkillAnchor(slotIndex);
    var target = document.getElementById('burst-target');
    var diag = document.querySelector('.burst-diag');
    var text = document.getElementById('burst-text');
    var labelX = Math.min(window.innerWidth - 360, anchor.x + 230);
    var labelY = Math.max(24, anchor.y - 188);
    var lineStartX = anchor.x + anchor.radius * 0.58;
    var lineStartY = anchor.y - anchor.radius * 0.52;
    var lineEndX = labelX - 24;
    var lineEndY = labelY + 18;
    var dx = lineEndX - lineStartX;
    var dy = lineEndY - lineStartY;
    var len = Math.max(90, Math.sqrt(dx * dx + dy * dy));
    var ang = Math.atan2(dy, dx);

    target.style.left = anchor.x + 'px';
    target.style.top = anchor.y + 'px';
    target.style.width = (anchor.radius * 2) + 'px';
    target.style.height = (anchor.radius * 2) + 'px';

    diag.style.left = lineStartX + 'px';
    diag.style.top = lineStartY + 'px';
    diag.style.width = len + 'px';
    diag.style.transform = 'rotate(' + ang + 'rad)';

    text.style.left = labelX + 'px';
    text.style.top = labelY + 'px';
}

function _resetBurstAnimations(overlay) {
    ['.burst-target-ring.outer', '.burst-target-ring.inner', '.burst-target-scan', '.burst-diag', '.burst-text']
        .forEach(function(sel) {
            var el = overlay.querySelector(sel);
            if (!el) return;
            el.style.animation = 'none';
            void el.offsetWidth;
            el.style.animation = '';
        });
}

function showBurstReady(slotIndex) {
    _burstVisible = true;
    var ov = document.getElementById('burst-overlay');
    _positionBurstReady(slotIndex || 1);
    ov.classList.remove('fadeout');
    ov.classList.remove('show');
    _resetBurstAnimations(ov);
    void ov.offsetWidth;
    ov.classList.add('show');
    snd('burst_ready');
    if (_burstTimer) clearTimeout(_burstTimer);
    _burstTimer = setTimeout(function() { hideBurstReady(); }, 2600);
}

function hideBurstReady() {
    if (_burstTimer) { clearTimeout(_burstTimer); _burstTimer = null; }
    if (!_burstVisible) return;
    _burstVisible = false;
    var ov = document.getElementById('burst-overlay');
    ov.classList.add('fadeout');
    setTimeout(function() {
        ov.classList.remove('show');
        ov.classList.remove('fadeout');
    }, 350);
}

function setPlayState(state) {
    var hp = document.getElementById('hp');
    hp.classList.remove('playing', 'paused');
    if (state === 'playing') hp.classList.add('playing');
    else if (state === 'paused') hp.classList.add('paused');
}

/* ═══ Sound via Python bridge ═══ */
function snd(name) {
    try {
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.play_sound(name);
        }
    } catch(e) {}
}

/* ═══ Context Menu helpers ═══ */
var ctxMenu = document.getElementById('ctx-menu');
var _exitPending = false;
var _hitRegionTimer = null;
var _hitRegionBootTimer = null;
var _hitRegionBootTries = 0;
var _hitRegionAcked = false;

function _isVisibleForHit(el) {
    if (!el) return false;
    if (el.id === 'ctx-menu' && !el.classList.contains('show')) return false;
    var style = window.getComputedStyle(el);
    if (!style || style.display === 'none' || style.visibility === 'hidden') return false;
    var rect = el.getBoundingClientRect();
    return rect.width >= 2 && rect.height >= 2;
}

function _collectRegions(selectors) {
    var regions = [];
    selectors.forEach(function(sel) {
        var el = document.querySelector(sel);
        if (!_isVisibleForHit(el)) return;
        var rect = el.getBoundingClientRect();
        regions.push({
            left: Math.round(rect.left),
            top: Math.round(rect.top),
            width: Math.round(rect.width),
            height: Math.round(rect.height)
        });
    });
    return regions;
}

function collectHitRegions() {
    var dispSel = ['.id-plate', '#ctx-menu'];
    var clkSel  = ['.id-plate', '#ctx-menu'];
    if (!_hpGroupHidden) {
        dispSel.push('.hp-bg-cover', '#hp', '#sta-row');
        clkSel.push('#hp');
    }
    return {
        display_regions: _collectRegions(dispSel),
        click_regions:   _collectRegions(clkSel)
    };
}

function reportHitRegions() {
    _hitRegionTimer = null;
    try {
        if (window.pywebview && window.pywebview.api && window.pywebview.api.set_hit_regions) {
            var result = window.pywebview.api.set_hit_regions(collectHitRegions());
            var ack = function() {
                if (_hitRegionAcked) return;
                _hitRegionAcked = true;
                try {
                    if (window.pywebview && window.pywebview.api && window.pywebview.api.notify_hp_hit_regions_ready) {
                        window.pywebview.api.notify_hp_hit_regions_ready();
                    }
                } catch (e) {}
            };
            if (result && typeof result.then === 'function') {
                result.then(ack).catch(function() {});
            } else {
                ack();
            }
        } else {
            scheduleHitRegionReport();
        }
    } catch (e) {}
}

function scheduleHitRegionReport() {
    if (_hitRegionTimer) clearTimeout(_hitRegionTimer);
    _hitRegionTimer = setTimeout(reportHitRegions, 30);
}

function scheduleHitRegionBootstrap() {
    scheduleHitRegionReport();
    setTimeout(scheduleHitRegionReport, 0);
    setTimeout(scheduleHitRegionReport, 60);
    setTimeout(scheduleHitRegionReport, 180);
    if (window.requestAnimationFrame) {
        window.requestAnimationFrame(function() {
            scheduleHitRegionReport();
        });
    }
    if (document.fonts && document.fonts.ready && typeof document.fonts.ready.then === 'function') {
        document.fonts.ready.then(function() {
            scheduleHitRegionReport();
        }).catch(function() {});
    }
}

function startHitRegionBootRetry() {
    if (_hitRegionBootTimer) clearInterval(_hitRegionBootTimer);
    _hitRegionBootTries = 0;
    _hitRegionBootTimer = setInterval(function() {
        _hitRegionBootTries += 1;
        scheduleHitRegionBootstrap();
        if (_hitRegionBootTries >= 40) {
            clearInterval(_hitRegionBootTimer);
            _hitRegionBootTimer = null;
        }
    }, 200);
}

function retriggerEntryBlur() {
    var hp = document.getElementById('hp');
    _restartHPPanelAnimation(hp, 'enter');
}

function preExit() {
    var hp = document.getElementById('hp');
    _restartHPPanelAnimation(hp, 'exit');
}

function exitApplication() {
    if (_exitPending) return;
    _exitPending = true;
    hideCtxMenu();
    snd('menu_close');
    preExit();
    setTimeout(function() {
        if (window.pywebview && window.pywebview.api && window.pywebview.api.exit_app) {
            window.pywebview.api.exit_app();
        } else if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.context_action('exit');
        }
    }, 260);
}

function showCtxMenu(x, y) {
    if (ctxMenu.classList.contains('show')) {
        hideCtxMenu();
        return;
    }
    setTimeout(function() {
        ctxMenu.classList.add('show');
        var pad = 18;
        var rect = ctxMenu.getBoundingClientRect();
        var posX = Math.min(Math.max(pad, x), Math.max(pad, window.innerWidth - rect.width - pad));
        /* Always open upward: menu bottom near click y */
        var posY = y - rect.height - 12;
        if (posY < pad) posY = pad;
        ctxMenu.style.left = posX + 'px';
        ctxMenu.style.top  = posY + 'px';
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.set_ctx_menu_active(true, {
                left: Math.round(posX),
                top: Math.round(posY),
                width: Math.round(rect.width),
                height: Math.round(rect.height)
            });
        }
        scheduleHitRegionReport();
    }, 50);
}

function hideCtxMenu() {
    ctxMenu.classList.remove('show');
    if (window.pywebview && window.pywebview.api) {
        window.pywebview.api.set_ctx_menu_active(false);
    }
    scheduleHitRegionReport();
}

/* ═══ Click (NO drag — fixed position) ═══ */
function _registerIdPlateClickHandlers() {
    var idPlate = document.querySelector('.id-plate');
    if (!idPlate) { setTimeout(_registerIdPlateClickHandlers, 50); return; }
    if (idPlate._saoClickBound) return;
    idPlate._saoClickBound = true;
    idPlate.addEventListener('click', function(e) {
        if (ctxMenu && ctxMenu.classList.contains('show')) { hideCtxMenu(); return; }
        snd('click');
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.toggle_menu();
        }
    });
    idPlate.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        e.stopPropagation();
        snd('click');
        showCtxMenu(e.clientX + 4, e.clientY - 26);
    });
}
_registerIdPlateClickHandlers();
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _registerIdPlateClickHandlers);
}

function _registerHpClickHandlers() {
    var hp = document.getElementById('hp');
    if (!hp) {
        /* Element not yet in DOM — retry shortly */
        setTimeout(_registerHpClickHandlers, 50);
        return;
    }
    if (hp._saoClickBound) return; /* prevent double-bind */
    hp._saoClickBound = true;

    hp.addEventListener('click', function(e) {
        if (ctxMenu && ctxMenu.contains(e.target)) return;
        snd('click');
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.toggle_menu();
        }
    });

    hp.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        e.stopPropagation();
        snd('click');
        showCtxMenu(e.clientX + 4, e.clientY - 26);
    });
}
_registerHpClickHandlers();
/* Also retry on DOMContentLoaded in case inline execution was too early */
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _registerHpClickHandlers);
}

/* ═══ Click outside → hide menu ═══ */
document.addEventListener('click', function(e) {
    if (ctxMenu && !ctxMenu.contains(e.target) && ctxMenu.classList.contains('show')) {
        hideCtxMenu();
    }
});

/* ═══ Menu item actions ═══ */
ctxMenu.querySelectorAll('.cm-item').forEach(function(item) {
    item.addEventListener('click', function(e) {
        e.stopPropagation();
        hideCtxMenu();
        snd('click');
        var action = this.getAttribute('data-action');
        if (action === 'exit') {
            exitApplication();
            return;
        }
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.context_action(action);
        }
    });
});

window.addEventListener('resize', scheduleHitRegionBootstrap);
window.addEventListener('pywebviewready', function() {
    scheduleHitRegionBootstrap();
    startHitRegionBootRetry();
});
window.addEventListener('load', function() {
    scheduleHitRegionBootstrap();
    setTimeout(scheduleHitRegionReport, 120);
    startHitRegionBootRetry();
});
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', scheduleHitRegionBootstrap);
} else {
    scheduleHitRegionBootstrap();
}
var _hpBootstrapTarget = document.getElementById('hp');
if (_hpBootstrapTarget) {
    _hpBootstrapTarget.addEventListener('animationend', scheduleHitRegionBootstrap);
    _hpBootstrapTarget.addEventListener('transitionend', scheduleHitRegionBootstrap);
}

/* ═══ Level Up Animation ═══ */
var _lvTimer = null;
function showLevelUp(oldLv, newLv) {
    var ov = document.getElementById('lv-overlay');
    document.getElementById('lv-num').textContent = 'Lv.' + oldLv + ' → Lv.' + newLv;
    ov.classList.remove('show');
    void ov.offsetWidth;  /* reflow 重启动画 */
    ov.classList.add('show');
    if (_lvTimer) clearTimeout(_lvTimer);
    _lvTimer = setTimeout(function() { ov.classList.remove('show'); }, 2700);
}

window.HP = {
    retriggerEntryBlur: retriggerEntryBlur,
    preExit: preExit,
    exitApp: exitApplication,
};
</script>
<script>
// Theme initialization
(function(){
    var panel='hp', darkCls='theme-dark', fallback='light';
    function apply(t){document.documentElement.classList.toggle(darkCls,t==='dark')}
    try{
        if(window.pywebview&&window.pywebview.api){
            window.pywebview.api.get_panel_themes().then(function(themes){
                apply((themes&&themes[panel])||fallback);
            }).catch(function(){apply(fallback)});
        }
    }catch(e){}
    window._applyPanelTheme=function(t){apply(t)};
})();
</script>
