<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Stamina</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@font-face {
    font-family: 'sao';
    src: url('fonts/SAOUI.ttf') format('truetype');
    font-display: block;
}
@font-face {
    font-family: 'saoLatin';
    src: url('fonts/SAOUI.ttf') format('truetype');
    font-display: block;
    unicode-range: U+0000-00FF, U+0100-024F;
}

:root {
    --font-ui: 'saoLatin', 'sao', 'Segoe UI', sans-serif;
    --cyan: #68e4ff;
    --gold: #f3af12;
    --bg: #0a0e18;
}

html, body {
    background: transparent;
    user-select: none;
    -webkit-user-select: none;
    margin: 0; padding: 0;
    overflow: hidden;
}

/* ═══ SAO System HUD — fully opaque, matches Entity _render_stamina_frame ═══ */
.stamina-panel {
    position: absolute;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 12px;
    gap: 2px;
    clip-path: polygon(0 3px, calc(100% - 8px) 0, 100% 5px, 100% 100%, 8px 100%, 0 calc(100% - 3px));
}

/* Inner border */
.stamina-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    clip-path: polygon(0 3px, calc(100% - 8px) 0, 100% 5px, 100% 100%, 8px 100%, 0 calc(100% - 3px));
    border: 1px solid rgba(48, 62, 84, 0.7);
    pointer-events: none;
}

/* HUD scan lines (horizontal raster) */
.stamina-panel::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        180deg,
        transparent 0px,
        transparent 2px,
        rgba(30, 40, 58, 0.35) 2px,
        rgba(30, 40, 58, 0.35) 3px
    );
    pointer-events: none;
}

/* Corner brackets — SAO */
.corner-tl, .corner-br {
    position: absolute;
    width: 7px; height: 7px;
    pointer-events: none;
}
.corner-tl {
    top: 2px; left: 1px;
    border-top: 1.5px solid rgba(104, 228, 255, 0.75);
    border-left: 1.5px solid rgba(104, 228, 255, 0.75);
}
.corner-br {
    bottom: 1px; right: 1px;
    border-bottom: 1.5px solid rgba(243, 175, 18, 0.6);
    border-right: 1.5px solid rgba(243, 175, 18, 0.6);
}

/* ═══ Top row: SAO system status ═══ */
.top-row {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 38%;
    z-index: 1;
}

.sys-pip {
    width: 5px; height: 5px;
    background: var(--cyan);
    flex-shrink: 0;
}
.sys-label {
    font-family: var(--font-ui);
    font-size: 10px;
    color: rgba(104, 228, 255, 0.8);
    letter-spacing: 1.5px;
    flex-shrink: 0;
}
.sys-status {
    font-family: var(--font-ui);
    font-size: 10px;
    color: rgba(104, 228, 255, 0.45);
    letter-spacing: 1px;
}
.sys-center {
    flex: 1;
    text-align: center;
    font-family: var(--font-ui);
    font-size: 9px;
    color: rgba(200, 220, 240, 0.35);
    letter-spacing: 2px;
}
.sys-time {
    font-family: var(--font-ui);
    font-size: 10px;
    color: rgba(200, 220, 240, 0.55);
    letter-spacing: 0.5px;
    flex-shrink: 0;
}

/* ═══ Separator ═══ */
.sep {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent 1%, rgba(104, 228, 255, 0.18) 15%, rgba(104, 228, 255, 0.18) 85%, transparent 99%);
    z-index: 1;
}

/* ═══ Bottom row: STA bar ═══ */
.bottom-row {
    display: flex;
    align-items: center;
    gap: 7px;
    height: 48%;
    z-index: 1;
}

.sta-pip {
    width: 5px; height: 5px;
    background: var(--gold);
    flex-shrink: 0;
}
.sta-label {
    font-family: var(--font-ui);
    font-size: 12px;
    color: rgba(243, 175, 18, 0.9);
    letter-spacing: 1.5px;
    text-shadow: 0 0 6px rgba(243, 175, 18, 0.2);
    flex-shrink: 0;
}

.sta-track {
    flex: 1;
    height: 7px;
    background: rgba(22, 28, 42, 1);
    border: 1px solid rgba(70, 88, 110, 0.45);
    position: relative;
    overflow: hidden;
}

.sta-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, #b8780a, #f3af12, #ffd54f);
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}
/* Top highlight on bar */
.sta-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: rgba(255, 220, 100, 0.4);
}

.sta-text {
    font-family: var(--font-ui);
    font-size: 10px;
    color: rgba(220, 235, 245, 0.75);
    letter-spacing: 0.5px;
    min-width: 52px;
    text-align: right;
    flex-shrink: 0;
}
</style>
</head>
<body>
<div class="stamina-panel">
    <span class="corner-tl"></span>
    <span class="corner-br"></span>

    <!-- Top: SAO system status -->
    <div class="top-row">
        <span class="sys-pip"></span>
        <span class="sys-label">SYSTEM</span>
        <span class="sys-status">[ LINK ACTIVE ]</span>
        <span class="sys-center">NErVGEAR</span>
        <span class="sys-time" id="sys-time">00:00:00</span>
    </div>

    <div class="sep"></div>

    <!-- Bottom: STA bar -->
    <div class="bottom-row">
        <span class="sta-pip"></span>
        <span class="sta-label">STA</span>
        <div class="sta-track">
            <div class="sta-fill" id="sta-fill" style="width:100%"></div>
        </div>
        <span class="sta-text" id="sta-text">0/0</span>
    </div>
</div>

<script>
function updateBars(hp, hpMax, sta, staMax) {
    var staPct = staMax > 0 ? Math.round(sta / staMax * 100) : 100;
    document.getElementById('sta-fill').style.width = staPct + '%';
    document.getElementById('sta-text').textContent = Math.floor(sta) + '/' + Math.floor(staMax);
}

function _updateClock() {
    var d = new Date();
    var h = ('0' + d.getHours()).slice(-2);
    var m = ('0' + d.getMinutes()).slice(-2);
    var s = ('0' + d.getSeconds()).slice(-2);
    document.getElementById('sys-time').textContent = h + ':' + m + ':' + s;
}

_updateClock();
setInterval(_updateClock, 1000);
</script>
</body>
</html>
