<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@font-face {
    font-family: 'sao';
    src: url('fonts/SAOUI.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
}
@font-face {
    font-family: 'saoLatin';
    src: url('fonts/SAOUI.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
    unicode-range: U+0000-00FF, U+0100-024F, U+1E00-1EFF, U+2000-206F, U+20A0-20CF;
}
@font-face {
    font-family: 'yuanJWD';
    src: url('fonts/ZhuZiAYuanJWD.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
}
@font-face {
    font-family: 'yuanJWDCJK';
    src: url('fonts/ZhuZiAYuanJWD.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
    unicode-range: U+2E80-2EFF, U+3000-303F, U+31C0-31EF, U+3400-4DBF, U+4E00-9FFF, U+F900-FAFF;
}

:root {
    --font-sao: 'saoLatin', 'sao', 'Segoe UI', sans-serif;
    --font-ui: 'saoLatin', 'sao', 'yuanJWDCJK', 'yuanJWD', 'Segoe UI', sans-serif;
}

html, body {
    height: 100%;
    background: transparent;
    margin: 0; padding: 0;
    user-select: none;
    -webkit-user-select: none;
    overflow: visible;
    scrollbar-width: none;
    -ms-overflow-style: none;
    opacity: 0;
    transition: opacity 0.2s;
    /* 浮动由 Python window.move() 驱动, 不在 CSS 层做 transform */
}
html::-webkit-scrollbar, body::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
}

body.opening .panel {
    animation: panel-enter-blur 0.42s cubic-bezier(0.22, 1, 0.36, 1) both,
               panel-live-blur 9s ease-in-out 0.42s infinite;
}
body.closing .panel {
    animation: panel-exit-blur 0.16s ease-in both;
}
body:not(.opening):not(.closing) .panel {
    animation: panel-live-blur 9s ease-in-out infinite;
}

@keyframes panel-enter-blur {
    0% {
        opacity: 0;
        transform: scale(0.96);
        box-shadow: 0 0 40px rgba(243, 175, 18, 0.22), 0 10px 38px rgba(0,0,0,0.28);
    }
    65% {
        opacity: 1;
        transform: scale(1.01);
    }
    100% {
        opacity: 1;
        transform: scale(1);
        box-shadow: 0 2px 16px rgba(0,0,0,0.18);
    }
}

@keyframes panel-exit-blur {
    0% {
        opacity: 1;
        transform: scale(1);
    }
    100% {
        opacity: 0;
        transform: scale(0.97);
        box-shadow: 0 0 34px rgba(243, 175, 18, 0.16), 0 8px 30px rgba(0,0,0,0.18);
    }
}

@keyframes panel-live-blur {
    0% {
        box-shadow: 0 2px 16px rgba(0,0,0,0.18);
    }
    25% {
        box-shadow: -2px 5px 22px rgba(0,0,0,0.16), 0 0 18px rgba(243, 175, 18, 0.05);
    }
    50% {
        box-shadow: 0 3px 18px rgba(0,0,0,0.2), 0 0 14px rgba(66, 140, 230, 0.05);
    }
    75% {
        box-shadow: 2px 5px 22px rgba(0,0,0,0.17), 0 0 18px rgba(243, 175, 18, 0.05);
    }
    100% {
        box-shadow: 0 2px 16px rgba(0,0,0,0.18);
    }
}

/* ═══ Panel Float (sinusoidal, ≤5px) ═══ */
@keyframes panel-float {
    0%   { transform: translate(0px,    0px); }
    20%  { transform: translate(-3px,   2px); }
    40%  { transform: translate(-1.5px, -3.5px); }
    60%  { transform: translate(2.5px,  -2px); }
    80%  { transform: translate(3px,    1.5px); }
    100% { transform: translate(0px,    0px); }
}

.panel {
    margin: 4px;
    height: calc(100% - 8px);
    display: flex;
    flex-direction: column;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 4px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.18);
    overflow: hidden;
    font-family: var(--font-ui);
    font-size: 12px;
    color: #555;
    will-change: box-shadow, opacity, transform;
    position: relative;
}

.panel-hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
}

.panel-header,
.panel-body {
    position: relative;
    z-index: 1;
}

@keyframes hud-drift-far-left {
    0% { transform: translate3d(-8px, 0px, 0); opacity: .40; }
    50% { transform: translate3d(10px, 4px, 0); opacity: .72; }
    100% { transform: translate3d(-8px, 0px, 0); opacity: .40; }
}
@keyframes hud-drift-near-left {
    0% { transform: translate3d(-20px, 0px, 0); opacity: .38; }
    50% { transform: translate3d(16px, -5px, 0); opacity: .90; }
    100% { transform: translate3d(-20px, 0px, 0); opacity: .38; }
}
@keyframes hud-drift-far-right {
    0% { transform: translate3d(8px, 0px, 0); opacity: .36; }
    50% { transform: translate3d(-10px, 5px, 0); opacity: .70; }
    100% { transform: translate3d(8px, 0px, 0); opacity: .36; }
}
@keyframes hud-drift-near-right {
    0% { transform: translate3d(18px, 0px, 0); opacity: .36; }
    50% { transform: translate3d(-18px, -6px, 0); opacity: .88; }
    100% { transform: translate3d(18px, 0px, 0); opacity: .36; }
}

.hud-lane {
    position: absolute;
    width: 118px;
    height: 40px;
    border: 1px solid rgba(104, 228, 255, 0.34);
    clip-path: polygon(0 8%, 88% 8%, 100% 0, 100% 100%, 12% 100%, 0 84%);
    box-shadow: inset 0 0 14px rgba(104, 228, 255, 0.06);
}
.hud-lane::before,
.hud-lane::after {
    content: '';
    position: absolute;
    inset: 0;
}
.hud-lane::before {
    background: linear-gradient(90deg, rgba(255,255,255,0), rgba(104,228,255,.16), rgba(255,255,255,0));
}
.hud-lane::after {
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0) 0 10px, rgba(255,255,255,.10) 10px 11px, rgba(255,255,255,0) 11px 18px);
    opacity: .28;
}
.hud-lane.gold {
    border-color: rgba(243, 175, 18, 0.34);
    box-shadow: inset 0 0 14px rgba(243, 175, 18, 0.08);
}
.hud-lane.gold::before {
    background: linear-gradient(90deg, rgba(255,255,255,0), rgba(243,175,18,.18), rgba(255,255,255,0));
}
.hud-lane .hud-label {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    left: 12px;
    font-family: var(--font-ui);
    font-size: 10px;
    letter-spacing: 1.2px;
    color: rgba(104, 228, 255, 0.78);
}
.hud-lane.gold .hud-label {
    color: rgba(243, 175, 18, 0.82);
}

.hud-left-far { left: 8px; top: 42px; animation: hud-drift-far-left 8.4s ease-in-out infinite; }
.hud-left-near { left: 14px; bottom: 18px; animation: hud-drift-near-left 5.8s ease-in-out infinite; }
.hud-right-far { right: 8px; top: 58px; animation: hud-drift-far-right 8.0s ease-in-out infinite; }
.hud-right-near { right: 12px; bottom: 22px; animation: hud-drift-near-right 5.6s ease-in-out infinite; }

.panel-header {
    background: rgba(245, 245, 247, 0.97);
    height: 26px;
    display: flex;
    align-items: center;
    cursor: grab;
    border-bottom: 1px solid #e8e8e8;
}
.panel-header:active { cursor: grabbing; }

.panel-title {
    font-size: 11px;
    color: #646364;
    padding-left: 10px;
    flex: 1;
    font-family: var(--font-ui);
    letter-spacing: 1px;
}

.panel-close {
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #999; font-size: 14px;
}
.panel-close:hover { color: #e53935; background: rgba(229,57,53,0.1); }

.panel-body { padding: 0; overflow: hidden; flex: 1; min-height: 0; }

/* ═══ Control panel ═══ */
.ctrl-body { padding: 8px 10px; }
.ctrl-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
}
.ctrl-label {
    width: 48px;
    color: #999;
    font-size: 11px;
    flex-shrink: 0;
}
.ctrl-btn {
    width: 28px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    background: #f0f0f0;
    border-radius: 3px;
    cursor: pointer;
    color: #646364;
    font-size: 14px;
    font-weight: bold;
    transition: background 0.15s;
}
.ctrl-btn:hover { background: rgba(243,175,18,0.7); color: #fff; }
.ctrl-btn:active { background: rgba(243,175,18,1); }

.ctrl-value {
    min-width: 65px;
    text-align: center;
    font-family: var(--font-ui);
    font-size: 12px;
    color: #333;
}
.ctrl-sep { height: 1px; background: #eee; margin: 6px 0; }

.ctrl-toggle {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 11px;
    margin-right: 6px;
    margin-bottom: 4px;
    transition: background 0.15s, color 0.15s;
}
.ctrl-toggle.on { background: rgba(243,175,18,0.85); color: #fff; }
.ctrl-toggle.off { background: #f0f0f0; color: #999; }
.ctrl-toggle:hover { opacity: 0.85; }

/* ═══ Status panel ═══ */
.stat-body { padding: 8px 10px; }
.stat-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid rgba(200,200,200,0.3);
    font-size: 12px;
}
.stat-row:last-child { border-bottom: none; }
.stat-label { color: #999; }
.stat-value { color: #555; font-weight: 500; }
.stat-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
}
.stat-dot.on { background: #3ad86c; box-shadow: 0 0 4px rgba(58,216,108,0.5); }
.stat-dot.off { background: #e0e0e0; }

/* ═══ Piano panel — 5 octaves SAO style ═══ */
.piano-wrap {
    position: relative;
    height: 80px;
    overflow: hidden;
    background: #fff;
}
.piano-whites {
    display: flex;
    height: 100%;
}
.pw {
    flex: 1;
    background: #f0f0f0;
    border-right: 1px solid #ddd;
    transition: background 0.06s;
    min-width: 0;
}
.pw:last-child { border-right: none; }

.piano-blacks {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    pointer-events: none;
}
.pb {
    position: absolute;
    width: 1.5%;
    height: 100%;
    background: #444;
    border-radius: 0 0 2px 2px;
    transition: background 0.06s;
    z-index: 2;
}

/* ═══ Visualizer — canvas bars ═══ */
.viz-wrap {
    width: 100%;
    height: 100%;
}
.viz-canvas {
    display: block;
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>
<div class="panel" id="panel">
    <div class="panel-header" id="panel-header">
        <span class="panel-title" id="panel-title">面板</span>
        <span class="panel-close" id="panel-close">×</span>
    </div>
    <div class="panel-body" id="panel-body"></div>
</div>

<script>
var panelType = '';

/* ═══ Drag ═══ */
(function() {
    var hdr = document.getElementById('panel-header');
    var drag = { on: false, sx: 0, sy: 0 };
    hdr.addEventListener('mousedown', function(e) {
        if (e.target.id === 'panel-close') return;
        drag.on = true;
        drag.sx = e.screenX;
        drag.sy = e.screenY;
        hdr.style.cursor = 'grabbing';
    });
    document.addEventListener('mousemove', function(e) {
        if (!drag.on) return;
        var dx = e.screenX - drag.sx;
        var dy = e.screenY - drag.sy;
        drag.sx = e.screenX;
        drag.sy = e.screenY;
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.window_drag(dx, dy);
        }
    });
    document.addEventListener('mouseup', function() {
        drag.on = false;
        document.getElementById('panel-header').style.cursor = 'grab';
    });
})();

function preClose() {
    document.body.classList.remove('opening');
    document.body.classList.add('closing');
}

document.getElementById('panel-close').addEventListener('click', function() {
    preClose();
    setTimeout(function() {
        if (window.pywebview && window.pywebview.api) window.pywebview.api.close_panel();
    }, 120);
});

function doAction(action) {
    if (window.pywebview && window.pywebview.api) window.pywebview.api.panel_action(action);
}

/* ═══════════════════════════════════════════════
   Piano — 5 octaves (C2-C7), SAO gold highlight
   Ported from SAOMiniPiano (sao_gui.py)
   ═══════════════════════════════════════════════ */
var _pianoActive = {};
var OCTAVES = 5;
var TOTAL_WHITES = OCTAVES * 7;
var BLACK_AFTER = [1,1,0,1,1,1,0];

function _buildPiano() {
    var body = document.getElementById('panel-body');
    body.innerHTML = '<div class="piano-wrap">' +
        '<div class="piano-whites" id="pw-row"></div>' +
        '<div class="piano-blacks" id="pb-row"></div></div>';
    var wr = document.getElementById('pw-row');
    for (var i = 0; i < TOTAL_WHITES; i++) {
        var d = document.createElement('div');
        d.className = 'pw';
        d.id = 'pw' + i;
        wr.appendChild(d);
    }
    var br = document.getElementById('pb-row');
    for (var oct = 0; oct < OCTAVES; oct++) {
        for (var j = 0; j < 7; j++) {
            if (!BLACK_AFTER[j]) continue;
            var wi = oct * 7 + j;
            var pct = ((wi + 1) / TOTAL_WHITES) * 100;
            var d2 = document.createElement('div');
            d2.className = 'pb';
            d2.id = 'pb' + oct + '_' + j;
            d2.style.left = (pct - 0.75) + '%';
            br.appendChild(d2);
        }
    }
}

var W_MAP = {0:0, 2:1, 4:2, 5:3, 7:4, 9:5, 11:6};
var B_MAP = {1:0, 3:1, 6:3, 8:4, 10:5};

function _lerpColor(a, b, t) {
    var ar = parseInt(a.slice(1,3),16), ag = parseInt(a.slice(3,5),16), ab2 = parseInt(a.slice(5,7),16);
    var br2 = parseInt(b.slice(1,3),16), bg = parseInt(b.slice(3,5),16), bb = parseInt(b.slice(5,7),16);
    var r = Math.round(ar+(br2-ar)*t), g = Math.round(ag+(bg-ag)*t), bl = Math.round(ab2+(bb-ab2)*t);
    return '#'+((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
}

function pianoNoteOn(midi_note, velocity, duration_ms) {
    var offset = midi_note - 36;
    if (offset < 0 || offset >= OCTAVES * 12) return;
    var oct = Math.floor(offset / 12);
    var semi = offset % 12;
    var tag, bright, normal;
    if (semi in W_MAP) {
        tag = 'pw' + (oct * 7 + W_MAP[semi]);
        bright = '#f3af12'; normal = '#f0f0f0';
    } else if (semi in B_MAP) {
        tag = 'pb' + oct + '_' + B_MAP[semi];
        bright = '#dea620'; normal = '#444444';
    } else return;

    if (_pianoActive[midi_note]) clearTimeout(_pianoActive[midi_note]);
    var el = document.getElementById(tag);
    if (!el) return;
    el.style.background = bright;

    /* Match entity SAOMiniPiano: 8 fade steps starting immediately, no hold phase */
    var STEPS = 8;
    var interval = Math.max(25, Math.floor(duration_ms / STEPS));
    var step = 0;
    function fade() {
        step++;
        if (step > STEPS) { el.style.background = ''; delete _pianoActive[midi_note]; return; }
        el.style.background = _lerpColor(bright, normal, step / STEPS);
        _pianoActive[midi_note] = setTimeout(fade, interval);
    }
    _pianoActive[midi_note] = setTimeout(fade, interval);
}

function pianoReset() {
    for (var k in _pianoActive) clearTimeout(_pianoActive[k]);
    _pianoActive = {};
    document.querySelectorAll('.pw,.pb').forEach(function(e) { e.style.background = ''; });
}

/* ═══════════════════════════════════════════════
   Visualizer — 36-bar horizontal chart (Canvas)
   Ported from gui.py MidiVisualizer
   ═══════════════════════════════════════════════ */
var NUM_BARS = 36, BAR_DECAY = 0.90;
var _barVals = new Float32Array(NUM_BARS);
var _barPeaks = new Float32Array(NUM_BARS);
var _hueOffset = 0, _beatBright = 0;
var _vizRunning = false, _vizCanvas = null, _vizCtx = null;
var BG = [255,255,255];
var _vizBpmTimes = [];
var _vizBpm = 0;

var KEY_BAR = {
    'z':0,'1':1,'x':2,'2':3,'c':4,'v':5,'3':6,'b':7,'4':8,'n':9,'5':10,'m':11,
    'a':12,'6':13,'s':14,'7':15,'d':16,'f':17,'8':18,'g':19,'9':20,'h':21,'0':22,'j':23,
    'q':24,'i':25,'w':26,'o':27,'e':28,'r':29,'p':30,'t':31,'[':32,'y':33,']':34,'u':35
};

function _hsv(h,s,v) {
    h=((h%360)+360)%360;
    var hi=Math.floor(h/60)%6, f=h/60-Math.floor(h/60);
    var p=v*(1-s), q=v*(1-f*s), t2=v*(1-(1-f)*s);
    var rgb=[[v,t2,p],[q,v,p],[p,v,t2],[p,q,v],[t2,p,v],[v,p,q]][hi];
    return [Math.round(rgb[0]*255),Math.round(rgb[1]*255),Math.round(rgb[2]*255)];
}

function _barCol(i) {
    var hue=(15+i/(NUM_BARS-1)*220+_hueOffset)%360;
    return _hsv(hue,0.88,Math.max(0.3,Math.min(1,0.6+0.35*_beatBright)));
}
function _barGlow(i) {
    var hue=(15+i/(NUM_BARS-1)*220+_hueOffset)%360;
    return _hsv(hue,0.55,1);
}

function _buildViz() {
    var body = document.getElementById('panel-body');
    body.innerHTML = '<div class="viz-wrap"><canvas class="viz-canvas" id="viz-canvas"></canvas></div>';
    _vizCanvas = document.getElementById('viz-canvas');
    setTimeout(function() {
        var rect = _vizCanvas.parentElement.getBoundingClientRect();
        _vizCanvas.width = Math.floor(rect.width);
        _vizCanvas.height = Math.floor(rect.height);
        _vizCtx = _vizCanvas.getContext('2d');
        _vizRunning = true;
        _vizAnimate();
    }, 60);
}

function vizTrigger(key, velocity, duration_ms) {
    var k = key.toLowerCase();
    if (k in KEY_BAR) {
        var idx = KEY_BAR[k];
        _barVals[idx] = Math.min(1, velocity);
        _barPeaks[idx] = Math.min(1, velocity);
        _beatBright = Math.min(1, _beatBright + 0.4);
        /* BPM estimation (matches entity MidiVisualizer) */
        var now = performance.now() / 1000;
        _vizBpmTimes.push(now);
        while (_vizBpmTimes.length > 0 && now - _vizBpmTimes[0] > 4.0) _vizBpmTimes.shift();
        if (_vizBpmTimes.length >= 3) {
            var total = 0;
            for (var j = 1; j < _vizBpmTimes.length; j++) total += _vizBpmTimes[j] - _vizBpmTimes[j-1];
            var avg = total / (_vizBpmTimes.length - 1);
            _vizBpm = avg > 0 ? 60 / avg : 0;
        }
    }
}

function _vizAnimate() {
    if (!_vizRunning) return;
    /* No hold phase — immediate decay matching entity MidiVisualizer */
    for (var i = 0; i < NUM_BARS; i++) {
        _barVals[i] *= BAR_DECAY;
        if (_barVals[i] < 0.008) _barVals[i] = 0;
        _barPeaks[i] *= 0.97;
        if (_barPeaks[i] < _barVals[i]) _barPeaks[i] = _barVals[i];
    }
    /* Hue rotation speed matches entity: 0.25 + (bpm/180)*0.8 per 33ms tick */
    var hueSpeed = 0.25 + (_vizBpm / 180) * 0.8;
    _hueOffset = (_hueOffset + hueSpeed) % 360;
    if (_beatBright > 0) _beatBright = Math.max(0, _beatBright - 0.04);
    _drawBars();
    setTimeout(_vizAnimate, 33);  /* ~30fps matching entity UPDATE_INTERVAL */
}

function _drawBars() {
    var c=_vizCtx, w=_vizCanvas.width, h=_vizCanvas.height;
    if (!c||w<2||h<2) return;
    c.fillStyle='#ffffff'; c.fillRect(0,0,w,h);
    var pad=3, uH=h-pad*2, uW=w-pad*2, bH=uH/NUM_BARS, mW=uW-2;
    for (var i=0;i<NUM_BARS;i++){
        var y=pad+(NUM_BARS-1-i)*bH, val=_barVals[i], pk=_barPeaks[i], col=_barCol(i), gl=_barGlow(i);
        if(pk>=0.015){
            var pw=Math.floor(pk*mW), sg=Math.min(8,Math.max(3,pw/6|0)), sw=pw/sg;
            for(var s=0;s<sg;s++){
                var t=s/Math.max(1,sg-1), br=0.06+0.18*Math.pow(t,1.3);
                c.fillStyle='rgb('+Math.floor(BG[0]+(col[0]-BG[0])*br)+','+
                    Math.floor(BG[1]+(col[1]-BG[1])*br)+','+Math.floor(BG[2]+(col[2]-BG[2])*br)+')';
                c.fillRect(pad+(s*sw|0),y,Math.ceil(sw)+1,bH-1);
            }
        }
        if(val>=0.008){
            var bw=Math.floor(val*mW); if(bw<1)continue;
            var sg2=Math.min(16,Math.max(6,bw/4|0)), sw2=bw/sg2;
            for(var s2=0;s2<sg2;s2++){
                var t2=s2/Math.max(1,sg2-1), br2=0.12+0.88*Math.pow(t2,1.6);
                c.fillStyle='rgb('+Math.floor(BG[0]+(col[0]-BG[0])*br2)+','+
                    Math.floor(BG[1]+(col[1]-BG[1])*br2)+','+Math.floor(BG[2]+(col[2]-BG[2])*br2)+')';
                c.fillRect(pad+(s2*sw2|0),y,Math.ceil(sw2)+1,bH-1);
            }
            var tip=pad+bw, gln=Math.min(18,Math.max(4,bw/5|0));
            for(var gi=0;gi<4;gi++){
                var tg=gi/3, gx=tip-gln+(gi*gln/4|0);
                if(gx<pad)continue;
                c.fillStyle='rgb('+Math.min(255,col[0]+(gl[0]-col[0])*tg|0)+','+
                    Math.min(255,col[1]+(gl[1]-col[1])*tg|0)+','+Math.min(255,col[2]+(gl[2]-col[2])*tg|0)+')';
                c.fillRect(gx,y,Math.ceil(gln/4)+1,bH-1);
            }
        }
    }
}

function vizReset() {
    _barVals.fill(0); _barPeaks.fill(0); _beatBright=0; _hueOffset=0;
    _vizBpmTimes=[]; _vizBpm=0;
}

/* ═══ Init panel by type ═══ */
function initPanel(type, state) {
    panelType = type;
    document.body.classList.remove('closing');
    document.body.classList.add('opening');
    document.documentElement.style.opacity = '1';
    document.body.style.opacity = '1';
    var title = document.getElementById('panel-title');

    if (type === 'control') {
        title.textContent = 'CTRL 控制面板';
        var body = document.getElementById('panel-body');
        body.className = 'panel-body ctrl-body';
        body.innerHTML =
            '<div class="ctrl-row">' +
                '<span class="ctrl-label">速度</span>' +
                '<span class="ctrl-btn" onclick="doAction(\'speeddown\')">−</span>' +
                '<span class="ctrl-value" id="val-speed">1.00×</span>' +
                '<span class="ctrl-btn" onclick="doAction(\'speedup\')">+</span>' +
            '</div>' +
            '<div class="ctrl-row">' +
                '<span class="ctrl-label">移调</span>' +
                '<span class="ctrl-btn" onclick="doAction(\'transpose_down\')">−</span>' +
                '<span class="ctrl-value" id="val-transpose">+0</span>' +
                '<span class="ctrl-btn" onclick="doAction(\'transpose_up\')">+</span>' +
            '</div>' +
            '<div class="ctrl-sep"></div>' +
            '<div>' +
                '<span class="ctrl-toggle on" id="tog-melody" onclick="doAction(\'toggle_melody\')">♪ 主旋律</span>' +
                '<span class="ctrl-toggle on" id="tog-bass" onclick="doAction(\'toggle_bass\')">♫ 伴奏</span>' +
            '</div>' +
            '<div style="margin-top:2px">' +
                '<span class="ctrl-toggle off" id="tog-directc" onclick="doAction(\'toggle_directc\')">C调直转</span>' +
                '<span class="ctrl-toggle off" id="tog-glissando" onclick="doAction(\'toggle_glissando\')">滑奏</span>' +
            '</div>' +
            '<div class="ctrl-sep"></div>' +
            '<div>' +
                '<span class="ctrl-toggle off" id="tog-midi" onclick="doAction(\'midi_channel\')">⊞ MIDI通道控制</span>' +
            '</div>';
    } else if (type === 'status') {
        title.textContent = 'STAT 状态面板';
        var body2 = document.getElementById('panel-body');
        body2.className = 'panel-body stat-body';
        body2.innerHTML =
            '<div class="stat-row"><span class="stat-label">延音</span>' +
                '<span class="stat-value" id="stat-sustain"><span class="stat-dot off"></span>OFF</span></div>' +
            '<div class="stat-row"><span class="stat-label">状态</span>' +
                '<span class="stat-value" id="stat-play">就绪</span></div>' +
            '<div class="stat-row"><span class="stat-label">键位</span>' +
                '<span class="stat-value" id="stat-mode">经典60键</span></div>' +
            '<div class="stat-row"><span class="stat-label">BPM</span>' +
                '<span class="stat-value" id="stat-bpm">—</span></div>' +
            '<div class="stat-row"><span class="stat-label">速度</span>' +
                '<span class="stat-value" id="stat-speed">1.00×</span></div>' +
            '<div class="stat-row"><span class="stat-label">音域</span>' +
                '<span class="stat-value" id="stat-kbmode">正常</span></div>';
    } else if (type === 'piano') {
        title.textContent = 'KEYS 钢琴面板';
        _buildPiano();
    } else if (type === 'viz') {
        title.textContent = 'VIZ 可视化';
        _buildViz();
    }

    if (state) updatePanel(state);
    setTimeout(function() { document.body.classList.remove('opening'); }, 460);
}

/* ═══ Update panel state ═══ */
function updatePanel(data) {
    if (!data) return;
    if (panelType === 'control') {
        if (data.speed !== undefined) {
            var el = document.getElementById('val-speed');
            if (el) el.textContent = data.speed.toFixed(2) + '×';
        }
        if (data.transpose !== undefined) {
            var el2 = document.getElementById('val-transpose');
            if (el2) el2.textContent = (data.transpose >= 0 ? '+' : '') + data.transpose;
        }
        ['melody','bass','directc','glissando'].forEach(function(k) {
            if (data[k] !== undefined) {
                var el3 = document.getElementById('tog-' + k);
                if (el3) el3.className = 'ctrl-toggle ' + (data[k] ? 'on' : 'off');
            }
        });
    } else if (panelType === 'status') {
        if (data.sustain !== undefined) {
            var s = document.getElementById('stat-sustain');
            if (s) s.innerHTML = '<span class="stat-dot '+(data.sustain?'on':'off')+'"></span>'+(data.sustain?'ON':'OFF');
        }
        if (data.play_state) { var p=document.getElementById('stat-play'); if(p) p.textContent=data.play_state; }
        if (data.mode) { var m=document.getElementById('stat-mode'); if(m) m.textContent=data.mode; }
        if (data.bpm !== undefined) { var b=document.getElementById('stat-bpm'); if(b) b.textContent=data.bpm>0?Math.round(data.bpm):'—'; }
        if (data.speed !== undefined) { var sp=document.getElementById('stat-speed'); if(sp) sp.textContent=data.speed.toFixed(2)+'×'; }
        if (data.kb_mode !== undefined) {
            var km=document.getElementById('stat-kbmode');
            if (km) {
                km.textContent = data.kb_mode;
                km.style.color = data.kb_mode==='正常' ? '' : (data.kb_mode==='SHIFT ↑' ? '#3ad86c' : '#f3af12');
            }
        }
    }
}

window.Panel = {
    init: initPanel,
    preClose: preClose,
    update: updatePanel,
    noteOn: pianoNoteOn,
    noteReset: pianoReset,
    vizTrigger: vizTrigger,
    vizReset: vizReset,
};
</script>
</body>
</html>
