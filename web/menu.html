<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAO Menu</title>
<style>
/* ═══ Reset ═══ */
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ═══ SAO Fonts ═══ */
@font-face {
    font-family: 'sao';
    src: url('fonts/SAOUI.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
}
@font-face {
    font-family: 'saoLatin';
    src: url('fonts/SAOUI.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
    unicode-range: U+0000-00FF, U+0100-024F, U+1E00-1EFF, U+2000-206F, U+20A0-20CF;
}
@font-face {
    font-family: 'yuanJWD';
    src: url('fonts/ZhuZiAYuanJWD.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
}
@font-face {
    font-family: 'yuanJWDCJK';
    src: url('fonts/ZhuZiAYuanJWD.ttf') format('truetype');
    font-style: normal;
    font-weight: 400;
    font-display: block;
    unicode-range: U+2E80-2EFF, U+3000-303F, U+31C0-31EF, U+3400-4DBF, U+4E00-9FFF, U+F900-FAFF;
}

:root {
    --font-sao: 'saoLatin', 'sao', 'Segoe UI', sans-serif;
    --font-round: 'saoLatin', 'sao', 'yuanJWDCJK', 'yuanJWD', 'Microsoft YaHei UI', sans-serif;
    --font-ui: 'saoLatin', 'sao', 'yuanJWDCJK', 'yuanJWD', 'Segoe UI', sans-serif;
}

/* ═══════════════════════════════════════
   PopUpMenu — fullscreen overlay
   ═══════════════════════════════════════ */
html, body {
    width: 100vw;
    height: 100vh;
    background: transparent;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    font-family: var(--font-ui);
    letter-spacing: 1px;
    color: #555;
}

.position,
.leftInfoBox,
.child-menu,
.child-menu li span,
.child-menu li .shortcut,
.title,
.des,
.toast,
.current-file,
.picker-header span,
.picker-path-bar,
.picker-item,
.btn-use-folder,
.lb-box,
.lb-tab,
.lb-row,
.saoMsgBox,
.alert-title,
.alert-body,
.alert-footer {
    font-family: var(--font-ui) !important;
}

.info {
    position: fixed;
    z-index: 400;
    left: 0; top: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: rgba(0, 0, 0, 0.30);
    backdrop-filter: blur(0px);
    perspective: 600px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, backdrop-filter 0.6s ease;
}
.info.visible {
    opacity: 1;
    pointer-events: auto;
    backdrop-filter: blur(12px);
}
.info.entering {
    opacity: 0;
    backdrop-filter: blur(0px);
}
.info.closing {
    backdrop-filter: blur(0px);
    transition: opacity 0.55s ease, backdrop-filter 0.55s ease;
}

.menu-hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 1;
    mix-blend-mode: screen;
}
.menu-hud-lane {
    position: absolute;
    width: 172px;
    height: 30px;
    border: 1px solid rgba(104, 228, 255, 0.40);
    clip-path: polygon(0 16%, 88% 16%, 100% 0, 100% 100%, 10% 100%, 0 76%);
    box-shadow: inset 0 0 18px rgba(104, 228, 255, 0.12), 0 0 18px rgba(104, 228, 255, 0.05);
}
.menu-hud-lane.gold {
    border-color: rgba(243, 175, 18, 0.38);
    box-shadow: inset 0 0 18px rgba(243, 175, 18, 0.12), 0 0 18px rgba(243, 175, 18, 0.05);
}
.menu-hud-lane::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0) 0 12px, rgba(255,255,255,.08) 12px 13px, rgba(255,255,255,0) 13px 22px);
    opacity: .26;
}
.menu-hud-label {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    font-family: var(--font-ui);
    font-size: 12px;
    letter-spacing: 1.1px;
    color: rgba(104, 228, 255, 0.92);
}
.menu-hud-lane.gold .menu-hud-label { color: rgba(243, 175, 18, 0.90); }
@keyframes menu-hud-left-far {
    0% { transform: translate3d(-20px, 0, 0); opacity: .30; }
    50% { transform: translate3d(20px, 8px, 0); opacity: .66; }
    100% { transform: translate3d(-20px, 0, 0); opacity: .30; }
}
@keyframes menu-hud-left-near {
    0% { transform: translate3d(-34px, 0, 0); opacity: .28; }
    50% { transform: translate3d(28px, -10px, 0); opacity: .84; }
    100% { transform: translate3d(-34px, 0, 0); opacity: .28; }
}
@keyframes menu-hud-right-far {
    0% { transform: translate3d(20px, 0, 0); opacity: .30; }
    50% { transform: translate3d(-20px, 8px, 0); opacity: .66; }
    100% { transform: translate3d(20px, 0, 0); opacity: .30; }
}
@keyframes menu-hud-right-near {
    0% { transform: translate3d(34px, 0, 0); opacity: .28; }
    50% { transform: translate3d(-28px, -10px, 0); opacity: .84; }
    100% { transform: translate3d(34px, 0, 0); opacity: .28; }
}
.menu-hud-left-far { left: 7vw; top: 16vh; animation: menu-hud-left-far 8.4s ease-in-out infinite; }
.menu-hud-left-near { left: 9vw; bottom: 16vh; animation: menu-hud-left-near 5.9s ease-in-out infinite; }
.menu-hud-right-far { right: 8vw; top: 19vh; animation: menu-hud-right-far 8.0s ease-in-out infinite; }
.menu-hud-right-near { right: 9vw; bottom: 18vh; animation: menu-hud-right-near 5.6s ease-in-out infinite; }

/* ═══ Breathing animation for position ═══ */
.position {
    position: absolute;
    opacity: 1;
    animation: breath 8s linear infinite;
    animation-delay: .2s;
    transition: opacity 0.32s ease, transform 0.52s cubic-bezier(0.16, 1, 0.3, 1);
    transform-origin: 78% 42%;
    isolation: isolate;
    will-change: transform, opacity;
    z-index: 2;
}
.info.entering .position {
    opacity: 0;
    transform: translate(34px, -6px) scale(0.82) skewX(-7deg);
}
.info.closing .position {
    opacity: 0;
    transform: translate(24px, -2px) scale(0.88) skewX(-6deg);
}
.position::before,
.position::after {
    content: '';
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
    opacity: 0;
    transform-origin: 88% 42%;
    transition: opacity 0.35s ease, filter 0.35s ease, transform 0.35s ease;
}
.position::before {
    top: -96px;
    right: -138px;
    bottom: -108px;
    left: 152px;
    background:
        radial-gradient(ellipse at 88% 42%, rgba(243,175,18,0.22), rgba(243,175,18,0.14) 14%, rgba(77,232,244,0.08) 30%, rgba(255,255,255,0.0) 58%),
        radial-gradient(ellipse at 78% 44%, rgba(255,255,255,0.14), rgba(255,255,255,0.06) 12%, rgba(255,255,255,0.0) 34%),
        linear-gradient(108deg, rgba(255,255,255,0.0) 0%, rgba(77,232,244,0.03) 50%, rgba(243,175,18,0.08) 72%, rgba(255,255,255,0.0) 100%);
    box-shadow:
        0 0 72px rgba(243,175,18,0.16),
        0 0 116px rgba(77,232,244,0.06),
        0 0 22px rgba(255,255,255,0.06) inset;
    clip-path: polygon(28% 8%, 100% 0, 100% 100%, 22% 90%, 6% 52%);
    transform: translateX(28px) scale(0.72, 0.88);
    z-index: -2;
    mix-blend-mode: screen;
}
.position::after {
    top: -24px;
    right: -26px;
    bottom: -18px;
    left: 184px;
    background:
        linear-gradient(90deg,
            rgba(255,255,255,0.0) 0%,
            rgba(255,255,255,0.10) 18%,
            rgba(243,175,18,0.18) 52%,
            rgba(77,232,244,0.10) 76%,
            rgba(255,255,255,0.0) 100%),
        repeating-linear-gradient(90deg,
            rgba(255,255,255,0.0) 0px,
            rgba(255,255,255,0.0) 10px,
            rgba(255,255,255,0.035) 11px,
            rgba(255,255,255,0.0) 12px,
            rgba(255,255,255,0.0) 20px);
    box-shadow: 0 0 18px rgba(255,255,255,0.08);
    clip-path: polygon(0 18%, 100% 0, 100% 100%, 0 82%, 12% 50%);
    transform: translateX(24px) scaleX(0.42) skewX(-10deg);
    z-index: -1;
    mix-blend-mode: screen;
}
.info.visible .position::before,
.info.visible .position::after {
    opacity: 1;
}
.position.menu-focus-in {
    animation: sao-focus-in 0.58s cubic-bezier(0.16, 1, 0.3, 1) both,
               breath 8s linear 0.58s infinite;
}
.position.menu-focus-out {
    animation: sao-focus-out 0.34s cubic-bezier(0.4, 0, 1, 1) both;
}
.position.menu-focus-in::before {
    animation: sao-bloom-in 0.62s cubic-bezier(0.16, 1, 0.3, 1) both,
               sao-bloom-idle 5.8s ease-in-out 0.62s infinite;
}
.position.menu-focus-in::after {
    animation: sao-streak-in 0.48s cubic-bezier(0.16, 1, 0.3, 1) both,
               sao-streak-idle 4.2s ease-in-out 0.56s infinite;
}
.position.menu-focus-out::before {
    animation: sao-bloom-out 0.28s ease-in forwards;
}
.position.menu-focus-out::after {
    animation: sao-streak-out 0.22s ease-in forwards;
}
@keyframes breath {
    0%   { transform: translate(0); }
    25%  { transform: translate(0, 8px); }
    50%  { transform: translate(-8px, 0); }
    75%  { transform: translate(-8px, 8px); }
    100% { transform: translate(0); }
}
@keyframes sao-focus-in {
    0% {
        opacity: 0;
        transform: translate(34px, -6px) scale(0.82) skewX(-7deg);
    }
    42% {
        opacity: 1;
        transform: translate(-8px, 2px) scale(1.05) skewX(-1.5deg);
    }
    72% {
        transform: translate(3px, -1px) scale(0.992);
    }
    100% {
        opacity: 1;
        transform: translate(0px, 0px) scale(1);
    }
}
@keyframes sao-focus-out {
    0% {
        opacity: 1;
        transform: translate(0,0) scale(1);
    }
    100% {
        opacity: 0;
        transform: translate(24px, -2px) scale(0.88) skewX(-6deg);
    }
}
@keyframes sao-bloom-in {
    0% { opacity: 0; transform: translateX(44px) scale(0.48, 0.70); }
    52% { opacity: 0.84; transform: translateX(8px) scale(1.02, 1.03); }
    100% { opacity: 0.64; transform: translateX(0) scale(0.98, 1); }
}
@keyframes sao-bloom-out {
    from { opacity: 0.64; transform: translateX(0) scale(0.98, 1); }
    to { opacity: 0; transform: translateX(26px) scale(0.56, 0.76); }
}
@keyframes sao-bloom-idle {
    0%,100% { opacity: 0.48; transform: translateX(0) scale(0.98, 1); }
    50% { opacity: 0.72; transform: translateX(-3px) scale(1.01, 1.02); }
}
@keyframes sao-streak-in {
    0% { opacity: 0; transform: translateX(-18px) scaleX(0.18) skewX(-10deg); }
    60% { opacity: 0.62; transform: translateX(6px) scaleX(1.02) skewX(-10deg); }
    100% { opacity: 0.36; transform: translateX(0) scaleX(0.92) skewX(-10deg); }
}
@keyframes sao-streak-out {
    from { opacity: 0.36; transform: translateX(0) scaleX(0.92) skewX(-10deg); }
    to { opacity: 0; transform: translateX(28px) scaleX(0.28) skewX(-10deg); }
}
@keyframes sao-streak-idle {
    0%,100% { opacity: 0.24; transform: translateX(0) scaleX(0.92) skewX(-10deg); }
    50% { opacity: 0.40; transform: translateX(3px) scaleX(0.98) skewX(-10deg); }
}

/* ═══════════════════════════════════════
   MenuBar — circle buttons (right column)
   ═══════════════════════════════════════ */
.item_box {
    list-style: none;
    position: absolute;
    height: 340px;
    overflow: hidden;
}

.item {
    margin-bottom: 15px;
    --radius: 54px;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: 2px solid rgba(201, 198, 198, .6);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s ease;
    animation: itemDown 0.4s ease forwards;
    opacity: 0;
    filter: blur(10px);
    transform: translateY(-80px);
}
.item:nth-child(1) { animation-delay: 0.20s; }
.item:nth-child(2) { animation-delay: 0.15s; }
.item:nth-child(3) { animation-delay: 0.10s; }
.item:nth-child(4) { animation-delay: 0.05s; }
.item:nth-child(5) { animation-delay: 0.00s; }

@keyframes itemDown {
    from { transform: translateY(-80px); opacity: 0; filter: blur(14px); }
    to   { transform: translateY(0);     opacity: 1; filter: blur(0px); }
}

.closing .item {
    animation: itemUp 0.3s ease forwards;
}
@keyframes itemUp {
    from { transform: translateY(0);     opacity: 1; filter: blur(0px); }
    to   { transform: translateY(-80px); opacity: 0; filter: blur(14px); }
}

.item .in-circle {
    width: calc(var(--radius) - 8px);
    height: calc(var(--radius) - 8px);
    border-radius: 50%;
    background: rgba(255, 255, 255, .85);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease;
}

.item .in-circle i,
.item .in-circle .sao-icon {
    color: rgb(185, 183, 183);
    transition: color 0.2s ease;
}

.sao-icon {
    position: relative;
    width: 24px;
    height: 24px;
    display: inline-block;
    flex: 0 0 auto;
}
.sao-icon::before,
.sao-icon::after {
    content: '';
    position: absolute;
    box-sizing: border-box;
}

.sao-icon-user::before {
    width: 8px;
    height: 8px;
    left: 8px;
    top: 3px;
    border: 2px solid currentColor;
    border-radius: 50%;
    background: transparent;
}
.sao-icon-user::after {
    width: 16px;
    height: 9px;
    left: 4px;
    top: 13px;
    border: 2px solid currentColor;
    border-top-left-radius: 10px;
    border-top-right-radius: 10px;
    border-bottom: 0;
}

.sao-icon-play::before {
    left: 8px;
    top: 5px;
    width: 0;
    height: 0;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    border-left: 12px solid currentColor;
}

.sao-icon-file::before {
    left: 3px;
    top: 8px;
    width: 18px;
    height: 11px;
    border: 2px solid currentColor;
    border-radius: 2px;
    background: transparent;
}
.sao-icon-file::after {
    left: 5px;
    top: 5px;
    width: 8px;
    height: 5px;
    border: 2px solid currentColor;
    border-bottom: 0;
    border-top-left-radius: 2px;
    border-top-right-radius: 1px;
    background: transparent;
}

.sao-icon-settings {
    border: 2px solid currentColor;
    border-radius: 50%;
}
.sao-icon-settings::before {
    inset: 7px;
    border: 2px solid currentColor;
    border-radius: 50%;
    background: transparent;
}
.sao-icon-settings::after {
    left: 50%;
    top: 50%;
    width: 22px;
    height: 22px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background:
        linear-gradient(currentColor, currentColor) center 1px / 2px 4px no-repeat,
        linear-gradient(currentColor, currentColor) center calc(100% - 1px) / 2px 4px no-repeat,
        linear-gradient(currentColor, currentColor) 1px center / 4px 2px no-repeat,
        linear-gradient(currentColor, currentColor) calc(100% - 1px) center / 4px 2px no-repeat,
        linear-gradient(45deg, transparent 41%, currentColor 41%, currentColor 59%, transparent 59%) center / 100% 100% no-repeat;
    opacity: 0.9;
}

.sao-icon-keys::before {
    left: 2px;
    top: 4px;
    width: 20px;
    height: 16px;
    border: 2px solid currentColor;
    border-radius: 2px;
    background:
        linear-gradient(to right,
            transparent 0,
            transparent 3px,
            currentColor 3px,
            currentColor 4px,
            transparent 4px,
            transparent 8px,
            currentColor 8px,
            currentColor 9px,
            transparent 9px,
            transparent 13px,
            currentColor 13px,
            currentColor 14px,
            transparent 14px,
            transparent 18px,
            currentColor 18px,
            currentColor 19px,
            transparent 19px);
}
.sao-icon-keys::after {
    left: 4px;
    top: 4px;
    width: 4px;
    height: 8px;
    background: currentColor;
    box-shadow: 6px 0 0 currentColor, 12px 0 0 currentColor;
}

/* Active circle */
.item.active {
    border: 2px solid rgba(243, 175, 18, 0.6) !important;
}
.item.active .in-circle {
    background: rgba(243, 175, 18, 0.8) !important;
}
.item.active .in-circle i {
    color: rgba(255, 255, 255, .9) !important;
}

/* Hover */
.item:hover .in-circle {
    background: rgba(243, 175, 18, 0.8);
}
.item:hover .in-circle i {
    color: rgba(255, 255, 255, .9);
}
.item:hover {
    border: 2px solid rgba(243, 175, 18, 0.6);
}

/* ═══════════════════════════════════════
   LeftInfo — player info panel
   ═══════════════════════════════════════ */
.leftInfo {
    position: absolute;
    left: calc(-25px - 240px);
    top: -180px;
}

.leftInfoBox {
    opacity: 0;
    filter: blur(14px);
    transition: opacity 0.4s ease, filter 0.42s ease;
}
.leftInfoBox.show {
    opacity: 1;
    filter: blur(0px);
    animation: padding_open 1s ease forwards;
}

.leftInfoBox .top {
    background: rgba(255, 255, 255, .85);
    width: 240px;
    height: 252px;
    overflow: hidden;
    position: relative;
}

.top .title {
    margin: 0 10px;
    padding-top: 10px;
    padding-bottom: 7px;
    border-bottom: 2px solid rgb(170, 170, 170);
    letter-spacing: 1px;
    text-align: center;
    font-size: 15px;
    color: #555;
}

.right-triangle {
    width: 18px;
    height: 14px;
    position: absolute;
    top: 200px;
    left: 100%;
    clip-path: polygon(100% 50%, 0 100%, 0 0);
    background: rgba(255, 255, 255, .85);
}

.bottom-triangle {
    width: 15px;
    height: 10px;
    position: absolute;
    top: 0;
    left: 30px;
    clip-path: polygon(50% 100%, 100% 0, 0 0);
    background: rgba(255, 255, 255, .6);
}

.leftInfoBox .bottom {
    background: rgba(229, 227, 227, 0.8);
    width: 240px;
    height: 54px;
    position: relative;
    overflow: hidden;
}

.bottom .des {
    text-align: left;
    padding: 14px 10px;
    font-size: 13px;
    color: #666;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* LeftInfo panel animations */
@keyframes padding_open {
    0%   { padding-left: 240px; padding-top: 252px; padding-bottom: 54px; opacity: 0; }
    50%  { padding-left: 0; padding-top: 0; opacity: 1; }
    100% { padding-bottom: 0; }
}

/* ═══ Info Panel Content ═══ */
.info-content {
    padding: 12px;
}

.info-stat {
    display: flex;
    justify-content: space-between;
    padding: 6px 4px;
    border-bottom: 1px solid rgba(170, 170, 170, 0.3);
    font-size: 13px;
    color: #666;
}
.info-stat:last-child { border-bottom: none; }
.info-stat .label { color: #999; }
.info-stat .value { color: #555; font-weight: 500; }

.xp-bar-container {
    margin: 8px 4px;
    height: 6px;
    background: rgba(200, 200, 200, 0.5);
    border-radius: 3px;
    overflow: hidden;
}
.xp-bar-fill {
    height: 100%;
    background: linear-gradient(to right, rgb(243, 175, 18), rgb(255, 210, 80));
    border-radius: 3px;
    transition: width 0.5s ease;
}

/* ═══════════════════════════════════════
   ChildBar — sub-menu items
   ═══════════════════════════════════════ */
.cb_position {
    position: absolute;
    left: 86px;
    top: 27px;
}

.cb_position .line {
    opacity: 0;
    width: 2px;
    position: absolute;
    top: 50%;
    left: -5px;
    transform: translateY(-50%);
    background: linear-gradient(transparent, rgb(124,124,124) 15%, rgb(124,124,124) 85%, transparent);
    transition: opacity 0.2s ease, height 0.3s ease;
}
.cb_position .line.show { opacity: 1; }

.cb_position .arrow {
    opacity: 0;
    position: absolute;
    left: -22px;
    width: 19px;
    height: 17px;
    overflow: hidden;
    transform: translateY(-50%);
    clip-path: polygon(0 50%, 100% 100%, 100% 0);
    transition: opacity 0.2s ease;
}
.cb_position .arrow.show { opacity: 1; }

.cb_position .circle-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(34%, -50%);
    box-shadow: 0px 0px 0px 100px rgb(212,212,212);
}

.child-menu {
    position: absolute;
    top: 0;
    left: 0;
    list-style: none;
    opacity: 0;
    filter: blur(12px);
    transform: translateY(-30px);
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease, filter 0.3s ease;
}
.child-menu.show {
    opacity: 1;
    filter: blur(0px);
    transform: translateY(0);
    pointer-events: auto;
}

.child-menu li {
    height: 40px;
    margin-bottom: 3px;
    width: 180px;
    background: rgba(255, 255, 255, .85);
    display: flex;

.menu-glyph {

        linear-gradient(180deg, rgba(104, 228, 255, 0.18), rgba(104, 228, 255, 0)) center / 100% 100% no-repeat;
}
.menu-glyph::before,
.menu-glyph::after,
.menu-glyph span::before,
.menu-glyph span::after {
    content: '';

.mi-play::before { left: 7px; top: 2px; width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 8px solid currentColor; }
.mi-stop::before { left: 6px; top: 3px; width: 10px; height: 10px; border: 2px solid currentColor; }
.mi-speedup::before, .mi-speeddown::before { left: 10px; width: 0; height: 0; }
.mi-speedup::before { top: 2px; border-left: 4px solid transparent; border-right: 4px solid transparent; border-bottom: 7px solid currentColor; }
.mi-speeddown::before { top: 7px; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 7px solid currentColor; }
.mi-speedup::after, .mi-speeddown::after { left: 4px; width: 14px; height: 2px; background: currentColor; }
.mi-speedup::after { top: 12px; }
.mi-speeddown::after { top: 2px; }
.mi-restart::before { left: 5px; top: 3px; width: 10px; height: 10px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; }
.mi-restart::after { left: 12px; top: 1px; width: 0; height: 0; border-left: 5px solid currentColor; border-top: 3px solid transparent; border-bottom: 3px solid transparent; }
.mi-file::before { left: 5px; top: 2px; width: 12px; height: 12px; border: 2px solid currentColor; border-radius: 1px; }
.mi-file::after { right: 5px; top: 2px; width: 5px; height: 5px; border-top: 2px solid currentColor; border-right: 2px solid currentColor; }
.mi-dir::before { left: 3px; top: 5px; width: 16px; height: 8px; border: 2px solid currentColor; border-radius: 2px; }
.mi-dir::after { left: 5px; top: 2px; width: 7px; height: 5px; border: 2px solid currentColor; border-bottom: none; border-radius: 2px 2px 0 0; }
.mi-mel::before { left: 12px; top: 2px; width: 2px; height: 9px; background: currentColor; }
.mi-mel::after { left: 6px; top: 10px; width: 6px; height: 6px; border: 2px solid currentColor; border-radius: 50%; }
.mi-bass::before { left: 6px; top: 3px; width: 2px; height: 9px; background: currentColor; box-shadow: 6px 0 0 currentColor; }
.mi-bass::after { left: 4px; top: 10px; width: 5px; height: 5px; border: 2px solid currentColor; border-radius: 50%; box-shadow: 6px 0 0 -1px currentColor; }
.mi-cmap::before { left: 4px; top: 4px; width: 8px; height: 8px; border: 2px solid currentColor; transform: rotate(45deg); }
.mi-cmap::after { right: 3px; top: 6px; width: 5px; height: 2px; background: currentColor; box-shadow: -2px 4px 0 currentColor, -2px -4px 0 currentColor; }
.mi-gld::before { left: 3px; top: 10px; width: 16px; height: 2px; background: currentColor; transform: skewX(-40deg); box-shadow: 0 -5px 0 rgba(138,223,255,.65), 0 -10px 0 rgba(138,223,255,.35); }
.mi-keyplus::before, .mi-keyminus::before { left: 4px; top: 7px; width: 14px; height: 2px; background: currentColor; }
.mi-keyplus::after { left: 10px; top: 1px; width: 2px; height: 14px; background: currentColor; }
.mi-ctrl::before { left: 4px; top: 3px; width: 14px; height: 2px; background: currentColor; box-shadow: 0 4px 0 currentColor, 0 8px 0 currentColor; }
.mi-ctrl::after { left: 6px; top: 1px; width: 4px; height: 4px; border: 2px solid currentColor; border-radius: 50%; box-shadow: 6px 4px 0 -1px currentColor, -2px 8px 0 -1px currentColor; }
.mi-keys::before { left: 3px; top: 3px; width: 16px; height: 10px; border: 2px solid currentColor; }
.mi-keys::after { left: 7px; top: 3px; width: 2px; height: 10px; background: currentColor; box-shadow: 4px 0 0 currentColor, -4px 0 0 currentColor; }
.mi-stat::before { left: 4px; top: 2px; width: 14px; height: 12px; border: 2px solid currentColor; border-radius: 50%; }
.mi-stat::after { left: 9px; top: 7px; width: 4px; height: 4px; background: currentColor; border-radius: 50%; }
.mi-viz::before { left: 4px; bottom: 2px; width: 3px; height: 7px; background: currentColor; box-shadow: 5px -3px 0 currentColor, 10px -6px 0 currentColor; }
.mi-ent::before { left: 5px; top: 3px; width: 12px; height: 10px; border: 2px solid currentColor; clip-path: polygon(25% 0, 75% 0, 100% 50%, 75% 100%, 25% 100%, 0 50%); }
.mi-old::before { left: 4px; top: 3px; width: 11px; height: 11px; border: 2px solid currentColor; border-left-color: transparent; border-radius: 50%; }
.mi-old::after { right: 3px; top: 2px; width: 0; height: 0; border-left: 5px solid currentColor; border-top: 3px solid transparent; border-bottom: 3px solid transparent; }
.mi-rank::before { left: 3px; bottom: 2px; width: 4px; height: 5px; border: 2px solid currentColor; box-shadow: 6px -3px 0 -2px currentColor, 12px -6px 0 -2px currentColor; }
.mi-exit::before, .mi-exit::after { left: 10px; top: 1px; width: 2px; height: 14px; background: currentColor; }
.mi-exit::before { transform: rotate(45deg); }
.mi-exit::after { transform: rotate(-45deg); }
.mi-up::before { left: 9px; top: 1px; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-bottom: 7px solid currentColor; }
.mi-up::after { left: 10px; top: 7px; width: 2px; height: 7px; background: currentColor; }
.mi-mid::before { left: 5px; top: 2px; width: 10px; height: 12px; border: 2px solid currentColor; }

<script>
/* ═══════════════════════════════════════
   SAO Menu JavaScript Controller
   ═══════════════════════════════════════ */

var overlay = document.getElementById('popup-overlay');
var menuBar = document.getElementById('menu-bar');
var childBar = document.getElementById('child-bar');
var infoBox = document.getElementById('info-box');
var cbLine = document.getElementById('cb-line');
var cbArrow = document.getElementById('cb-arrow');

var currentActive = 'userInfo';
var menuOpen = false;

/* ═══ Sound helpers — via Python bridge ═══ */
var _sndMap = {
    'snd-click': 'click',
    'snd-popup': 'menu_open',
    'snd-dismiss': 'menu_close',
    'snd-panel': 'panel',
    'snd-menu': 'submenu',
    'snd-alert': 'alert',
    'snd-alert-close': 'alert_close'
};
function playSound(id) {
    try {
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.play_sound(_sndMap[id] || id);
        }
    } catch(e) {}
}

/* ═══ Fisheye backdrop — WebGL 60fps barrel distortion ═══ */
var _feCanvas, _feGl, _feProg, _feTex, _feRunning = false, _feTime = 0;
var _feStrLoc, _feTimLoc;

function _initFisheyeGL() {
    if (_feGl) return true;
    _feCanvas = document.createElement('canvas');
    _feCanvas.style.cssText = 'position:fixed;inset:-3%;width:106%;height:106%;z-index:-1;' +
        'pointer-events:none;opacity:0;filter:blur(14px);transition:opacity 0.5s ease,filter 0.42s ease;';
    document.getElementById('popup-overlay').prepend(_feCanvas);

    var gl = _feCanvas.getContext('webgl', {alpha:true, antialias:false, premultipliedAlpha:false});
    if (!gl) { gl = _feCanvas.getContext('experimental-webgl'); }
    if (!gl) return false;
    _feGl = gl;

    _feCanvas.width = Math.min(window.innerWidth, 1280);
    _feCanvas.height = Math.min(window.innerHeight, 720);

    /* Shaders */
    var vs = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vs, 'attribute vec2 p;varying vec2 uv;void main(){uv=p*0.5+0.5;gl_Position=vec4(p,0,1);}');
    gl.compileShader(vs);
    var fs = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fs,
        'precision mediump float;' +
        'varying vec2 uv;uniform sampler2D tex;uniform float str;uniform float t;' +
        'void main(){' +
        '  vec2 c=uv-0.5;float r2=dot(c,c);' +
        '  float s=str*(1.0+0.28*sin(t*0.82));' +
        '  vec2 drift=vec2(0.008*sin(t*0.5),0.006*cos(t*0.45));' +
        '  vec2 d=uv+c*s*r2+drift;' +
        '  vec2 dir=normalize(c+vec2(0.0001))* (0.012 + r2*0.038);' +
        '  vec3 b0=texture2D(tex, d-dir*2.4).rgb;' +
        '  vec3 b1=texture2D(tex, d-dir*1.2).rgb;' +
        '  vec3 b2=texture2D(tex, d).rgb;' +
        '  vec3 b3=texture2D(tex, d+dir*1.2).rgb;' +
        '  vec3 b4=texture2D(tex, d+dir*2.4).rgb;' +
        '  vec3 blur=(b0*0.10+b1*0.18+b2*0.34+b3*0.24+b4*0.14);' +
        '  float ca=0.0035 + r2*0.008;' +
        '  float rr=texture2D(tex, d + dir*ca).r;' +
        '  float gg=texture2D(tex, d).g;' +
        '  float bb=texture2D(tex, d - dir*ca).b;' +
        '  vec3 col=mix(blur, vec3(rr,gg,bb), 0.58);' +
        '  float line=0.985 + 0.015*sin((uv.y+t*0.08)*900.0);' +
        '  float vig=0.90-r2*0.42+0.07*sin(t*0.35);' +
        '  col*=vig*line;' +
        '  col.r*=1.0+0.06*sin(t*0.7);' +
        '  col.b*=1.0+0.05*cos(t*0.63);' +
        '  col += vec3(0.025,0.018,0.012)*(1.0-r2)*abs(sin(t*0.8));' +
        '  gl_FragColor=vec4(col,1.0);' +
        '}');
    gl.compileShader(fs);
    _feProg = gl.createProgram();
    gl.attachShader(_feProg, vs); gl.attachShader(_feProg, fs);
    gl.linkProgram(_feProg); gl.useProgram(_feProg);

    _feStrLoc = gl.getUniformLocation(_feProg, 'str');
    _feTimLoc = gl.getUniformLocation(_feProg, 't');
    gl.uniform1f(_feStrLoc, 0.35);

    /* Fullscreen quad */
    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(_feProg, 'p');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    /* Texture */
    _feTex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, _feTex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

    return true;
}

function _fisheyeFrame(ts) {
    if (!_feRunning) return;
    requestAnimationFrame(_fisheyeFrame);
    _feTime = ts * 0.001;
    var gl = _feGl;
    gl.viewport(0, 0, _feCanvas.width, _feCanvas.height);
    gl.uniform1f(_feTimLoc, _feTime);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function setFisheyeBg(dataUrl) {
    if (!_initFisheyeGL()) {
        /* WebGL fallback — plain CSS */
        var el = document.getElementById('fisheye-bg-fallback');
        if (!el) {
            el = document.createElement('div');
            el.id = 'fisheye-bg-fallback';
            el.style.cssText = 'position:fixed;inset:-3%;width:106%;height:106%;z-index:-1;' +
                'background-size:cover;background-position:center;opacity:0;' +
                'transition:opacity 0.5s,filter 0.42s;pointer-events:none;filter:blur(14px);';
            document.getElementById('popup-overlay').prepend(el);
        }
        el.style.backgroundImage = 'url(' + dataUrl + ')';
        setTimeout(function(){ el.style.opacity = '0.78'; el.style.filter = 'blur(1.2px)'; }, 50);
        return;
    }

    /* Upload new screenshot as texture */
    var img = new Image();
    img.onload = function() {
        var gl = _feGl;
        gl.bindTexture(gl.TEXTURE_2D, _feTex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
        if (!_feRunning) {
            _feRunning = true;
            requestAnimationFrame(_fisheyeFrame);
            setTimeout(function(){ _feCanvas.style.opacity = '0.82'; _feCanvas.style.filter = 'blur(1.1px)'; }, 50);
        } else {
            _feCanvas.style.filter = 'blur(1.1px)';
        }
    };
    img.src = dataUrl;
}

function stopFisheyeBg() {
    _feRunning = false;
    if (_feCanvas) {
        _feCanvas.style.opacity = '0';
        _feCanvas.style.filter = 'blur(14px)';
    }
    var fb = document.getElementById('fisheye-bg-fallback');
    if (fb) {
        fb.style.opacity = '0';
        fb.style.filter = 'blur(14px)';
    }
}

/* ═══ Menu Open / Close ═══ */
function openMenu(x, y) {
    if (menuOpen) return;
    menuOpen = true;
    playSound('snd-popup');

    var pos = document.getElementById('menu-position');
    pos.style.left = Math.max(300, Math.min(x || 500, window.innerWidth - 150)) + 'px';
    pos.style.top  = Math.max(100, Math.min(y || 300, window.innerHeight - 400)) + 'px';
    pos.classList.remove('menu-focus-out');
    pos.classList.remove('menu-focus-in');
    void pos.offsetWidth;
    pos.classList.add('menu-focus-in');

    overlay.classList.remove('closing');
    overlay.classList.add('entering');
    overlay.classList.add('visible');
    setTimeout(function() { overlay.classList.remove('entering'); }, 20);

    /* Reset item animations */
    menuBar.querySelectorAll('.item').forEach(function(el) {
        el.style.animation = 'none';
        el.offsetHeight; /* reflow */
        el.style.animation = '';
    });

    /* Show userInfo by default */
    activateCircle('userInfo');
}

function closeMenu() {
    if (!menuOpen) return;
    menuOpen = false;
    playSound('snd-dismiss');
    stopFisheyeBg();
    var pos = document.getElementById('menu-position');
    pos.classList.remove('menu-focus-in');
    pos.classList.remove('menu-focus-out');
    void pos.offsetWidth;
    pos.classList.add('menu-focus-out');

    /* TV 关电视动画 */
    var tvoff = document.getElementById('tv-off-overlay');
    tvoff.classList.remove('active');
    void tvoff.offsetWidth;
    tvoff.classList.add('active');

    overlay.classList.remove('entering');
    overlay.classList.add('closing');
    setTimeout(function() {
        overlay.classList.remove('visible', 'closing');
        tvoff.classList.remove('active');
        hideAllSubMenus();
        infoBox.classList.remove('show');
    }, 550);
}

var _exitPending = false;
function exitApplication() {
    if (_exitPending) return;
    _exitPending = true;
    closeMenu();
    setTimeout(function() {
        if (window.pywebview && window.pywebview.api && window.pywebview.api.exit_app) {
            window.pywebview.api.exit_app();
        } else if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.menu_action('exit');
        }
    }, 560);
}

/* Click backdrop to close — route through Python so window hides properly */
overlay.addEventListener('click', function(e) {
    if (e.target === overlay) {
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.toggle_menu();
        } else {
            closeMenu();
        }
    }
});

/* ═══ Circle activation ═══ */
function activateCircle(name) {
    playSound('snd-click');

    /* Toggle if same circle */
    if (currentActive === name) {
        var items = menuBar.querySelectorAll('.item');
        var first = items[0];
        if (first.classList.contains('active')) {
            first.classList.remove('active');
            hideAllSubMenus();
            infoBox.classList.remove('show');
            cbLine.classList.remove('show');
            cbArrow.classList.remove('show');
            currentActive = null;
        }
        return;
    }

    currentActive = name;

    /* Rotate the clicked item to top */
    var items = Array.from(menuBar.querySelectorAll('.item'));
    var targetIdx = items.findIndex(function(el) { return el.getAttribute('data-name') === name; });

    /* Move target to first position */
    if (targetIdx > 0) {
        for (var i = 0; i < targetIdx; i++) {
            menuBar.appendChild(menuBar.firstElementChild);
        }
    }

    /* Update active state */
    items = menuBar.querySelectorAll('.item');
    items.forEach(function(el) { el.classList.remove('active'); });
    menuBar.firstElementChild.classList.add('active');

    /* Show appropriate content */
    hideAllSubMenus();

    if (name === 'userInfo') {
        infoBox.classList.add('show');
        playSound('snd-panel');
        cbLine.classList.remove('show');
        cbArrow.classList.remove('show');
    } else {
        infoBox.classList.remove('show');
        var sub = document.getElementById('sub-' + name);
        if (sub) {
            sub.classList.add('show');
            playSound('snd-menu');
            /* Update line height */
            var itemCount = sub.querySelectorAll('li').length;
            cbLine.style.height = (itemCount * 43 - 9) + 'px';
            cbLine.classList.add('show');
            cbArrow.classList.add('show');
        }
    }
}

function hideAllSubMenus() {
    document.querySelectorAll('.child-menu').forEach(function(el) {
        el.classList.remove('show');
    });
}

/* ═══ File Picker ═══ */
var _pickerMode = 'file';
var _pickerCurrentDir = '';

function showFilePicker(dataJson) {
    var data = (typeof dataJson === 'string') ? JSON.parse(dataJson) : dataJson;
    _pickerMode = data.mode || 'file';
    _pickerCurrentDir = data.current || '';
    document.getElementById('picker-title').textContent = _pickerMode === 'folder' ? '选择文件夹' : '选择文件';
    document.getElementById('picker-path').textContent = _pickerCurrentDir;
    document.getElementById('filepicker-box').className =
        'saoPickerBox' + (_pickerMode === 'folder' ? ' picker-mode-folder' : '');

    var list = document.getElementById('picker-list');
    list.innerHTML = '';

    if (data.parent) {
        var upEl = document.createElement('div');
        upEl.className = 'picker-item is-up';
        upEl.innerHTML = '<i class="menu-glyph mi-up"></i><span class="item-name">.. 上级目录</span>';
        upEl.addEventListener('click', function() {
            playSound('snd-click');
            _pickerBrowse(data.parent);
        });
        list.appendChild(upEl);
    }

    (data.dirs || []).forEach(function(d) {
        var el = document.createElement('div');
        el.className = 'picker-item is-dir';
        el.innerHTML = '<i class="menu-glyph mi-dir"></i><span class="item-name">' + _escHtml(d.name) + '</span>';
        el.addEventListener('click', function() {
            playSound('snd-click');
            _pickerBrowse(d.path);
        });
        list.appendChild(el);
    });

    (data.files || []).forEach(function(f) {
        var el = document.createElement('div');
        el.className = 'picker-item';
        var infoStr = f.size ? '<span class="item-info">' + _fmtSize(f.size) + '</span>' : '';
        el.innerHTML = '<i class="menu-glyph mi-mid"></i><span class="item-name">' + _escHtml(f.name) + '</span>' + infoStr;
        el.addEventListener('click', function() {
            playSound('snd-click');
            closeFilePicker();
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.select_file(f.path);
            }
        });
        list.appendChild(el);
    });

    if (!(data.parent) && !(data.dirs||[]).length && !(data.files||[]).length) {
        list.innerHTML = '<div class="picker-empty">暂无 MIDI 文件</div>';
    }

    playSound('snd-alert');
    document.getElementById('filepicker-dialog').classList.add('show');
}

function closeFilePicker() {
    document.getElementById('filepicker-dialog').classList.remove('show');
}

function _pickerBrowse(path) {
    if (!window.pywebview || !window.pywebview.api) return;
    window.pywebview.api.browse_dir(path).then(function(result) {
        var d = (typeof result === 'string') ? JSON.parse(result) : result;
        d.mode = _pickerMode;
        showFilePicker(d);
    });
}

function _escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function _fmtSize(bytes) {
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1048576) return Math.round(bytes/1024) + 'K';
    return (bytes/1048576).toFixed(1) + 'M';
}

document.getElementById('picker-close').addEventListener('click', closeFilePicker);
document.getElementById('picker-use-folder').addEventListener('click', function() {
    closeFilePicker();
    if (window.pywebview && window.pywebview.api) {
        window.pywebview.api.select_folder(_pickerCurrentDir);
    }
});

/* ═══ Circle click handlers ═══ */
menuBar.querySelectorAll('.item').forEach(function(item) {
    item.addEventListener('click', function(e) {
        e.stopPropagation();
        var name = this.getAttribute('data-name');
        activateCircle(name);
    });
});

/* ═══ Child menu item clicks ═══ */
document.querySelectorAll('.child-menu li').forEach(function(li) {
    li.addEventListener('click', function(e) {
        e.stopPropagation();
        playSound('snd-click');
        var action = this.getAttribute('data-action');
        if (action === 'exit') {
            exitApplication();
            return;
        }
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.menu_action(action);
        }
    });
});

/* ═══ Alert dialog ═══ */
function showAlert(title, body, showOk) {
    playSound('snd-alert');
    document.getElementById('alert-title').textContent = title;
    document.getElementById('alert-body').textContent = body;
    var dialog = document.getElementById('alert-dialog');
    dialog.classList.add('show');

    if (!showOk) {
        document.getElementById('alert-ok').style.display = 'none';
    } else {
        document.getElementById('alert-ok').style.display = '';
    }
}

function closeAlert() {
    playSound('snd-alert-close');
    playSound('snd-click');
    var dialog = document.getElementById('alert-dialog');
    dialog.classList.remove('show');
}

document.getElementById('alert-close').addEventListener('click', closeAlert);
document.getElementById('alert-ok').addEventListener('click', function() {
    closeAlert();
    if (window.pywebview && window.pywebview.api) {
        window.pywebview.api.alert_ok();
    }
});

/* ═══ Toast ═══ */
function showToast(msg, duration) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, duration || 2000);
}

/* ═══ API: update info panel ═══ */
function updateInfo(data) {
    if (data.username) document.getElementById('info-username').textContent = data.username;
    if (data.level !== undefined) document.getElementById('info-level').textContent = 'Lv.' + data.level;
    if (data.xp_pct !== undefined) document.getElementById('info-xp').style.width = data.xp_pct + '%';
    if (data.profession) document.getElementById('info-profession').textContent = data.profession;
    if (data.hp !== undefined) document.getElementById('info-hp').textContent = data.hp;
    if (data.sta !== undefined) document.getElementById('info-sta').textContent = data.sta;
    if (data.des) document.getElementById('info-des').textContent = data.des;
    if (data.file) document.getElementById('current-file').textContent = '♪ ' + data.file;
}

/* ═══ API: update toggle badges ═══ */
function updateBadge(id, isOn) {
    var badge = document.getElementById('badge-' + id);
    if (badge) {
        badge.textContent = isOn ? 'ON' : 'OFF';
        badge.className = 'badge ' + (isOn ? 'on' : 'off');
    }
}

/* ═══ Escape key to close ═══ */
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        if (document.getElementById('lb-dialog').classList.contains('show')) {
            closeLeaderboard();
        } else if (document.getElementById('filepicker-dialog').classList.contains('show')) {
            closeFilePicker();
        } else if (document.getElementById('alert-dialog').classList.contains('show')) {
            closeAlert();
        } else if (menuOpen) {
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.toggle_menu();
            } else {
                closeMenu();
            }
        }
    }
});

/* ═══ Leaderboard ═══ */
var _lbCurrentSort = 'xp';
var _lbEntries = [];
var _lbFiltered = [];
var _lbPageIndex = 0;
var _lbPerPage = 10;
var _lbSelfDevice = '';
var _lbSelfDeviceName = '';
var _lbSelfRank = null;
var _lbFocusRank = null;

function _updateLbSize(rowCount) {
    var box = document.querySelector('#lb-dialog .lb-box');
    var rows = Math.max(1, Math.min(_lbPerPage, rowCount || 1));
    box.style.height = (52 + 42 + 42 + 38 + rows * 40 + 56) + 'px';
}

function _lbStatValue(e) {
    if (_lbCurrentSort === 'xp') return 'XP ' + e.xp;
    if (_lbCurrentSort === 'level') return 'Lv.' + e.level;
    if (_lbCurrentSort === 'songs_played') return e.songs_played + '曲';
    if (_lbCurrentSort === 'play_time') return _fmtTime(e.play_time);
    return '—';
}

function _lbApplyFilter(resetPage) {
    var q = (document.getElementById('lb-search').value || '').trim().toLowerCase();
    _lbFocusRank = null;
    if (!q) {
        _lbFiltered = _lbEntries.slice();
    } else if (/^#?\d+$/.test(q)) {
        var rank = parseInt(q.replace('#', ''), 10);
        _lbFiltered = _lbEntries.slice();
        var idx = _lbFiltered.findIndex(function(e) { return Number(e.rank) === rank; });
        if (idx >= 0) {
            _lbFocusRank = rank;
            _lbPageIndex = Math.floor(idx / _lbPerPage);
            _lbRender();
            return;
        }
        _lbFiltered = [];
    } else {
        _lbFiltered = _lbEntries.filter(function(e) {
            var hay = [e.rank, e.player_id, e.username, e.device_name, e.profession, e.device_id].join(' ').toLowerCase();
            return hay.indexOf(q) >= 0;
        });
    }
    if (resetPage !== false) _lbPageIndex = 0;
    _lbRender();
}

function _lbRender() {
    var list = document.getElementById('lb-list');
    var shown = _lbSelfDeviceName || '--';
    document.getElementById('lb-self-id').textContent = 'PLAYER ID: ' + shown;
    document.getElementById('lb-self-rank').textContent = 'SELF RANK: ' + (_lbSelfRank ? ('#' + _lbSelfRank) : '--');

    if (!_lbFiltered || _lbFiltered.length === 0) {
        list.innerHTML = '<div class="lb-empty">未找到匹配的排名记录</div>';
        document.getElementById('lb-page').textContent = '0 / 0';
        _updateLbSize(1);
        return;
    }

    var totalPages = Math.max(1, Math.ceil(_lbFiltered.length / _lbPerPage));
    _lbPageIndex = Math.max(0, Math.min(totalPages - 1, _lbPageIndex));
    var start = _lbPageIndex * _lbPerPage;
    var pageRows = _lbFiltered.slice(start, start + _lbPerPage);
    list.innerHTML = '';
    pageRows.forEach(function(e) {
        var row = document.createElement('div');
        row.className = 'lb-row';
        if (e.is_self || (_lbSelfDevice && e.device_id === _lbSelfDevice)) row.className += ' lb-self';
        if (_lbFocusRank && Number(e.rank) === Number(_lbFocusRank)) row.className += ' lb-jump';
        var primaryName = _escHtml(e.player_id || e.username || e.device_name || 'Player');
        var metaBits = [];
        if (e.username && e.username !== (e.player_id || e.device_name)) metaBits.push('@' + _escHtml(e.username));
        if (e.profession) metaBits.push(_escHtml(e.profession));
        row.innerHTML =
            '<span class="lb-rank">' + (e.rank <= 3 ? ['TOP1','TOP2','TOP3'][e.rank-1] : '#'+e.rank) + '</span>' +
            '<span class="lb-name">' + primaryName + (metaBits.length ? '<span class="lb-sub">' + metaBits.join(' · ') + '</span>' : '') + '</span>' +
            '<span class="lb-lv">Lv.' + e.level + '</span>' +
            '<span class="lb-stat">' + _lbStatValue(e) + '</span>';
        list.appendChild(row);
    });
    document.getElementById('lb-page').textContent = (_lbPageIndex + 1) + ' / ' + totalPages;
    document.getElementById('lb-prev').style.opacity = _lbPageIndex > 0 ? '1' : '0.42';
    document.getElementById('lb-next').style.opacity = _lbPageIndex < totalPages - 1 ? '1' : '0.42';
    _updateLbSize(pageRows.length);
}

function showLeaderboard(dataJson) {
    var data = (typeof dataJson === 'string') ? JSON.parse(dataJson) : dataJson;
    _lbCurrentSort = data.sort || _lbCurrentSort;
    _lbEntries = (data && data.entries) ? data.entries.slice() : [];
    _lbSelfDevice = data.self_device || '';
    _lbSelfDeviceName = data.self_player_id || data.self_device_name || '';
    _lbSelfRank = null;
    _lbFocusRank = null;
    _lbEntries.forEach(function(e, idx) {
        if (e.rank === undefined) e.rank = idx + 1;
        if (e.is_self || (_lbSelfDevice && e.device_id === _lbSelfDevice)) {
            _lbSelfRank = e.rank;
            _lbSelfDeviceName = _lbSelfDeviceName || e.player_id || e.username || e.device_name || '';
        }
    });
    document.querySelectorAll('.lb-tab').forEach(function(t) { t.classList.remove('active'); });
    var activeTab = document.querySelector('.lb-tab[data-sort="' + _lbCurrentSort + '"]');
    if (activeTab) activeTab.classList.add('active');

    if (_lbEntries.length === 0) {
        document.getElementById('lb-list').innerHTML = '<div class="lb-empty">暂无排行数据<br><span style="font-size:11px;color:#bbb;">完成演奏后数据将自动上传</span></div>';
        document.getElementById('lb-self-id').textContent = 'PLAYER ID: ' + (_lbSelfDeviceName || '--');
        document.getElementById('lb-self-rank').textContent = 'SELF RANK: --';
        document.getElementById('lb-page').textContent = '0 / 0';
        _updateLbSize(1);
    } else {
        _lbApplyFilter(true);
    }

    playSound('snd-alert');
    document.getElementById('lb-dialog').classList.add('show');
}

function closeLeaderboard() {
    document.getElementById('lb-dialog').classList.remove('show');
}

function _fmtTime(sec) {
    if (sec < 60) return Math.round(sec) + 's';
    if (sec < 3600) return Math.round(sec / 60) + 'min';
    return (sec / 3600).toFixed(1) + 'h';
}

document.getElementById('lb-close').addEventListener('click', closeLeaderboard);
document.getElementById('lb-prev').addEventListener('click', function() {
    if (_lbPageIndex > 0) {
        _lbPageIndex -= 1;
        _lbRender();
        playSound('snd-click');
    }
});
document.getElementById('lb-next').addEventListener('click', function() {
    var totalPages = Math.max(1, Math.ceil(_lbFiltered.length / _lbPerPage));
    if (_lbPageIndex < totalPages - 1) {
        _lbPageIndex += 1;
        _lbRender();
        playSound('snd-click');
    }
});
document.getElementById('lb-search-btn').addEventListener('click', function() {
    playSound('snd-click');
    _lbApplyFilter(true);
});
document.getElementById('lb-mine-btn').addEventListener('click', function() {
    if (!_lbSelfRank) return;
    document.getElementById('lb-search').value = '#' + _lbSelfRank;
    playSound('snd-click');
    _lbApplyFilter(true);
});
document.getElementById('lb-search').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        playSound('snd-click');
        _lbApplyFilter(true);
    }
});

document.getElementById('lb-tabs').querySelectorAll('.lb-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
        document.querySelectorAll('.lb-tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        _lbCurrentSort = tab.getAttribute('data-sort');
        document.getElementById('lb-list').innerHTML = '<div class="lb-loading">加载中...</div>';
        playSound('snd-click');
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.fetch_leaderboard(_lbCurrentSort);
        }
    });
});

/* ═══ Python bridge: expose JS functions ═══ */
window.SAO = {
    openMenu: openMenu,
    closeMenu: closeMenu,
    exitApp: exitApplication,
    updateInfo: updateInfo,
    updateBadge: updateBadge,
    showAlert: showAlert,
    closeAlert: closeAlert,
    showToast: showToast,
    setFisheyeBg: setFisheyeBg,
    stopFisheyeBg: stopFisheyeBg,
    showFilePicker: showFilePicker,
    closeFilePicker: closeFilePicker,
    showLeaderboard: showLeaderboard,
    closeLeaderboard: closeLeaderboard,
};
</script>
